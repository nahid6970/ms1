# User-tier policy to allow all tools automatically
# Priority 999 ensures this wins within the User tier (base 2)

[[rule]]
toolName = "run_shell_command"
decision = "allow"
priority = 999

[[rule]]
toolName = "write_file"
decision = "allow"
priority = 999

[[rule]]
toolName = "replace"
decision = "allow"
priority = 999

[[rule]]
toolName = "delete_file"
decision = "allow"
priority = 999

[[rule]]
toolName = "create_directory"
decision = "allow"
priority = 999

[[rule]]
toolName = "move_file"
decision = "allow"
priority = 999

[[rule]]
toolName = "delegate_to_agent"
decision = "allow"
priority = 999

[[rule]]
toolName = "show_task_complete_notification"
decision = "allow"
priority = 999

[[rule]]
mcpName = "*"
toolName = "*"
decision = "allow"
priority = 999

[[rule]]
mcpName = "notify"
toolName = "*"
decision = "allow"
priority = 999
