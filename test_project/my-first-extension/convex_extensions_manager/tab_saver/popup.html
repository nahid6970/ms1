<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tab Saver</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📑 Saved Tabs</h1>
      <div class="tab-count">
        <span id="tabCount">0</span> tabs saved
      </div>
      <button id="settingsBtn" class="settings-btn" title="Settings">⚙️</button>
    </div>

    <div id="tabList" class="tab-list">
      <div class="empty-state">
        <p>No saved tabs yet!</p>
        <p class="hint">Right-click on any page and select "Save & Close Tab"</p>
      </div>
    </div>

    <div class="footer">
      <button id="saveCurrentTab" class="btn btn-primary">Save Tab</button>
      <button id="addAllTabs" class="btn btn-secondary">➕ All Tabs</button>
      <button id="saveToConvex" class="btn btn-primary">💾 Save</button>
      <button id="loadFromConvex" class="btn btn-success">📥 Load</button>
    </div>
  </div>

  <!-- Settings Modal -->
  <div id="settingsModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>⚙️ Settings</h2>
        <button id="closeModal" class="close-btn">&times;</button>
      </div>
      <div class="modal-body">
        <div class="setting-group">
          <label for="ytIconSize">YouTube Icon Size (px):</label>
          <input type="range" id="ytIconSize" min="16" max="32" value="20" step="2">
          <span id="ytIconValue">20px</span>
        </div>
        <div class="setting-group">
          <label for="channelIconSize">Channel Icon Size (px):</label>
          <input type="range" id="channelIconSize" min="12" max="24" value="18" step="2">
          <span id="channelIconValue">18px</span>
        </div>
        
        <div class="setting-group">
          <label>Deadline Colors (Urgent):</label>
          <div class="color-pickers">
            <div class="picker-item"><label>BG</label><input type="color" id="urgentBg" value="#ff4757"></div>
            <div class="picker-item"><label>Text</label><input type="color" id="urgentFg" value="#ffffff"></div>
            <div class="picker-item"><label>Border</label><input type="color" id="urgentBorder" value="#eb3b5a"></div>
            <div class="picker-item"><label>Bold</label><input type="checkbox" id="urgentBold" checked></div>
          </div>
        </div>
        <div class="setting-group">
          <label>Deadline Colors (Safe):</label>
          <div class="color-pickers">
            <div class="picker-item"><label>BG</label><input type="color" id="safeBg" value="#e3f2fd"></div>
            <div class="picker-item"><label>Text</label><input type="color" id="safeFg" value="#1976d2"></div>
            <div class="picker-item"><label>Border</label><input type="color" id="safeBorder" value="#bbdefb"></div>
            <div class="picker-item"><label>Bold</label><input type="checkbox" id="safeBold"></div>
          </div>
        </div>
        
        <div class="settings-actions">
          <button id="resetSettings" class="btn btn-secondary">Reset Settings</button>
          <button id="clearAll" class="btn btn-danger">Clear All Saved Tabs</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Deadline Edit Modal -->
  <div id="deadlineModal" class="modal">
    <div class="modal-content" style="background: #0d0d12; border: 1px solid #00f3ff; box-shadow: 0 0 20px rgba(0, 243, 255, 0.2); color: #fff;">
      <div style="background: #00f3ff; color: #000; padding: 12px 20px; display: flex; align-items: center; justify-content: space-between;">
        <span style="font-weight: 900; font-size: 13px; letter-spacing: 2px; text-transform: uppercase;">Edit</span>
        <button id="closeDeadlineModal" class="close-btn" style="color: #000; opacity: 1;">&times;</button>
      </div>
      <div class="modal-body" style="padding: 25px; display: flex; flex-direction: column; gap: 20px;">
        <div style="display: flex; flex-direction: column; gap: 8px;">
          <label style="font-size: 10px; font-weight: 800; color: #00f3ff; text-transform: uppercase; letter-spacing: 1px;">Days from today</label>
          <input type="number" id="editDeadlineDays" min="1" style="background: #1a1a24; border: 1px solid #333; color: #fff; padding: 12px; font-size: 14px; outline: none; width: 100%; box-sizing: border-box;">
        </div>
        <div style="display: flex; flex-direction: column; gap: 8px;">
          <label style="font-size: 10px; font-weight: 800; color: #00f3ff; text-transform: uppercase; letter-spacing: 1px;">Pick a date</label>
          <input type="date" id="editDeadlineDate" style="background: #1a1a24; border: 1px solid #333; color: #fff; padding: 12px; font-size: 14px; outline: none; cursor: pointer; width: 100%; color-scheme: dark; box-sizing: border-box;">
        </div>
        <div style="display: flex; flex-direction: column; gap: 8px;">
          <label style="font-size: 10px; font-weight: 800; color: #00f3ff; text-transform: uppercase; letter-spacing: 1px;">Tag</label>
          <div style="display: flex; gap: 10px;">
            <select id="editTag" style="background: #1a1a24; border: 1px solid #333; color: #fff; padding: 12px; font-size: 14px; outline: none; flex: 1; cursor: pointer;">
              <option value="">No Tag</option>
            </select>
            <button id="addTagBtn" style="background: #1a1a24; border: 1px solid #00f3ff; color: #00f3ff; padding: 0 15px; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; border-radius: 0;">+</button>
          </div>
        </div>
        <div id="newTagInputContainer" style="display: none; flex-direction: column; gap: 8px;">
          <label style="font-size: 10px; font-weight: 800; color: #00f3ff; text-transform: uppercase; letter-spacing: 1px;">New Tag Name</label>
          <div style="display: flex; gap: 10px;">
            <input type="text" id="newTagName" placeholder="Enter tag name..." style="background: #1a1a24; border: 1px solid #333; color: #fff; padding: 12px; font-size: 14px; outline: none; flex: 1;">
            <button id="saveNewTagBtn" style="background: #00f3ff; color: #000; border: none; padding: 0 15px; font-weight: 800; cursor: pointer;">Add</button>
          </div>
        </div>
        <div style="display: flex; gap: 10px; margin-top: 5px;">
          <button id="cancelDeadlineBtn" class="btn btn-secondary" style="background: transparent; border: 1px solid #333; color: #999; border-radius: 0;">Cancel</button>
          <button id="saveDeadlineBtn" class="btn btn-primary" style="background: #00f3ff; color: #000; border-radius: 0; font-weight: 800; border: none;">Apply</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Custom Context Menu -->
  <div id="customContextMenu" class="custom-menu">
    <div id="menuSetDeadline" class="menu-item">⏰ Set Deadline</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
>
