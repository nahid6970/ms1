<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tab Saver</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📑 Saved Tabs</h1>
      <div class="tab-count">
        <span id="tabCount">0</span> tabs saved
      </div>
      <button id="settingsBtn" class="settings-btn" title="Settings">⚙️</button>
    </div>

    <div id="tabList" class="tab-list">
      <div class="empty-state">
        <p>No saved tabs yet!</p>
        <p class="hint">Right-click on any page and select "Save & Close Tab"</p>
      </div>
    </div>

    <div class="footer">
      <button id="addAllTabs" class="btn btn-secondary">➕ Add All Tabs</button>
      <button id="saveToConvex" class="btn btn-primary">💾 Save</button>
      <button id="loadFromConvex" class="btn btn-success">📥 Load</button>
    </div>
  </div>

  <!-- Settings Modal -->
  <div id="settingsModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>⚙️ Settings</h2>
        <button id="closeModal" class="close-btn">&times;</button>
      </div>
      <div class="modal-body">
        <div class="setting-group">
          <label for="ytIconSize">YouTube Icon Size (px):</label>
          <input type="range" id="ytIconSize" min="16" max="32" value="20" step="2">
          <span id="ytIconValue">20px</span>
        </div>
        <div class="setting-group">
          <label for="channelIconSize">Channel Icon Size (px):</label>
          <input type="range" id="channelIconSize" min="12" max="24" value="18" step="2">
          <span id="channelIconValue">18px</span>
        </div>
        
        <div class="setting-group">
          <label>Deadline Colors (Urgent):</label>
          <div class="color-pickers">
            <div class="picker-item"><label>BG</label><input type="color" id="urgentBg" value="#ff4757"></div>
            <div class="picker-item"><label>Text</label><input type="color" id="urgentFg" value="#ffffff"></div>
            <div class="picker-item"><label>Border</label><input type="color" id="urgentBorder" value="#eb3b5a"></div>
            <div class="picker-item"><label>Bold</label><input type="checkbox" id="urgentBold" checked></div>
          </div>
        </div>
        <div class="setting-group">
          <label>Deadline Colors (Safe):</label>
          <div class="color-pickers">
            <div class="picker-item"><label>BG</label><input type="color" id="safeBg" value="#e3f2fd"></div>
            <div class="picker-item"><label>Text</label><input type="color" id="safeFg" value="#1976d2"></div>
            <div class="picker-item"><label>Border</label><input type="color" id="safeBorder" value="#bbdefb"></div>
            <div class="picker-item"><label>Bold</label><input type="checkbox" id="safeBold"></div>
          </div>
        </div>
        
        <div class="settings-actions">
          <button id="resetSettings" class="btn btn-secondary">Reset Settings</button>
          <button id="clearAll" class="btn btn-danger">Clear All Saved Tabs</button>
        </div>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
