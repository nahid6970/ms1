<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tab Saver</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="top-controls">
      <div class="view-tabs" role="tablist" aria-label="Saved tab views">
        <button id="viewAllTabs" class="view-tab active" role="tab" aria-selected="true" data-view="all">
          <span>All</span>
          <span class="view-tab-count" id="allTabCount">0</span>
        </button>
        <button id="viewOutdatedTabs" class="view-tab" role="tab" aria-selected="false" data-view="outdated">
          <span>Outdated +2d</span>
          <span class="view-tab-count" id="outdatedTabCount">0</span>
        </button>
      </div>

      <div class="search-wrap">
        <input id="tabSearch" class="tab-search" type="search" placeholder="Search tabs, URLs, or tags">
      </div>
    </div>

    <div id="tabList" class="tab-list">
      <div class="empty-state">
        <p>No saved tabs yet!</p>
        <p class="hint">Right-click on any page and select "Save & Close Tab"</p>
      </div>
    </div>

    <div class="footer">
      <button id="saveCurrentTab" class="btn btn-primary">Save Tab</button>
      <button id="addAllTabs" class="btn btn-secondary">➕ All Tabs</button>
      <button id="settingsBtn" class="btn btn-settings" title="Settings">⚙️</button>
      <button id="saveToConvex" class="btn btn-primary">💾 Backup</button>
      <button id="loadFromConvex" class="btn btn-success">📥 Restore</button>
    </div>
  </div>

  <!-- Settings Modal -->
  <div id="settingsModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>⚙️ Settings</h2>
        <button id="closeModal" class="close-btn">&times;</button>
      </div>
      <div class="modal-body">
        <div class="setting-group">
          <label for="ytIconSize">YouTube Icon Size (px):</label>
          <input type="range" id="ytIconSize" min="16" max="32" value="20" step="2">
          <span id="ytIconValue">20px</span>
        </div>
        <div class="setting-group">
          <label for="channelIconSize">Channel Icon Size (px):</label>
          <input type="range" id="channelIconSize" min="12" max="24" value="18" step="2">
          <span id="channelIconValue">18px</span>
        </div>
        
        <div class="setting-group">
          <label style="font-weight: 800; color: #00f3ff; text-transform: uppercase; letter-spacing: 1px; font-size: 11px;">Deadline Styles</label>
          <div style="display: flex; flex-direction: column; background: #1a1a24; padding: 12px; border-radius: 4px; border: 1px solid #333; margin-top: 8px;">
            <!-- Urgent Style Row -->
            <div style="display: flex; align-items: center; gap: 8px; padding-bottom: 8px; border-bottom: 1px solid #333; margin-bottom: 8px;">
              <span style="flex: 1; font-size: 10px; font-weight: 700; color: #ff4757; text-transform: uppercase;">Urgent (<= 3 days)</span>
              <div style="display: flex; gap: 4px; align-items: center;">
                <input type="color" id="urgentBg" title="Background Color" style="width: 20px; height: 20px; border: 1px solid #444; background: none; cursor: pointer; padding: 0;">
                <input type="color" id="urgentFg" title="Text Color" style="width: 20px; height: 20px; border: 1px solid #444; background: none; cursor: pointer; padding: 0;">
                <input type="color" id="urgentBorder" title="Border Color" style="width: 20px; height: 20px; border: 1px solid #444; background: none; cursor: pointer; padding: 0;">
                <input type="checkbox" id="urgentBold" title="Bold Text" style="cursor: pointer;">
              </div>
            </div>
            <!-- Safe Style Row -->
            <div style="display: flex; align-items: center; gap: 8px;">
              <span style="flex: 1; font-size: 10px; font-weight: 700; color: #00f3ff; text-transform: uppercase;">Safe Style</span>
              <div style="display: flex; gap: 4px; align-items: center;">
                <input type="color" id="safeBg" title="Background Color" style="width: 20px; height: 20px; border: 1px solid #444; background: none; cursor: pointer; padding: 0;">
                <input type="color" id="safeFg" title="Text Color" style="width: 20px; height: 20px; border: 1px solid #444; background: none; cursor: pointer; padding: 0;">
                <input type="color" id="safeBorder" title="Border Color" style="width: 20px; height: 20px; border: 1px solid #444; background: none; cursor: pointer; padding: 0;">
                <input type="checkbox" id="safeBold" title="Bold Text" style="cursor: pointer;">
              </div>
            </div>
          </div>
        </div>

        <div class="setting-group">
          <label style="font-weight: 800; color: #00f3ff; text-transform: uppercase; letter-spacing: 1px; font-size: 11px;">Manage Tags</label>
          <div id="manageTagsList" style="display: flex; flex-direction: column; gap: 8px; background: #1a1a24; padding: 12px; border-radius: 4px; border: 1px solid #333; max-height: 200px; overflow-y: auto; margin-top: 8px;">
            <!-- Tags will be listed here dynamically -->
          </div>
        </div>
        
        <div class="settings-actions">
          <button id="resetSettings" class="btn btn-secondary">Reset Settings</button>
          <button id="clearAll" class="btn btn-danger">Clear All Saved Tabs</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Deadline Edit Modal -->
  <div id="deadlineModal" class="modal">
    <div class="modal-content modal-theme">
      <div class="modal-theme-header">
        <span class="modal-theme-title">Edit</span>
        <button id="closeDeadlineModal" class="close-btn modal-theme-close">&times;</button>
      </div>
      <div class="modal-body modal-theme-body">
        <div class="modal-field">
          <label for="editDeadlineDays">Days from today</label>
          <input type="number" id="editDeadlineDays" min="1" class="modal-input">
        </div>
        <div class="modal-field">
          <label for="editDeadlineDate">Pick a date</label>
          <input type="date" id="editDeadlineDate" class="modal-input modal-date-input">
        </div>
        <div class="modal-field">
          <label for="editTag">Tag</label>
          <div class="modal-inline-row">
            <select id="editTag" class="modal-select">
              <option value="">No Tag</option>
            </select>
            <button id="addTagBtn" class="modal-add-btn">+</button>
          </div>
        </div>
        <div id="newTagInputContainer" class="modal-field modal-new-tag" style="display: none;">
          <label for="newTagName">New Tag Name & Colors (BG / Border)</label>
          <div class="modal-inline-row">
            <input type="text" id="newTagName" placeholder="Enter tag name..." class="modal-input">
            <div class="modal-color-row">
              <input type="color" id="newTagColor" value="#e3f2fd" title="Background Color" class="modal-color-input">
              <input type="color" id="newTagBorderColor" value="#bbdefb" title="Border Color" class="modal-color-input">
            </div>
            <button id="saveNewTagBtn" class="modal-primary-btn">Add</button>
          </div>
        </div>
        <div class="modal-actions">
          <button id="cancelDeadlineBtn" class="btn btn-secondary">Cancel</button>
          <button id="saveDeadlineBtn" class="btn btn-primary">Apply</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Custom Context Menu -->
  <div id="customContextMenu" class="custom-menu">
    <div id="menuSetDeadline" class="menu-item">⏰ Edit</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
