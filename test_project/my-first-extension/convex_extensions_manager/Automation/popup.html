<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>ClickFlow Automator</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo-area">
        <span class="logo-icon">⚡</span>
        <h1>ClickFlow</h1>
        <div id="status-badge" class="badge idle">Idle</div>
      </div>

      <!-- Horizontal Project Profiles Selector -->
      <div class="project-selector-row">
        <select id="projectSelect" title="Select Project Profile" style="width: 130px; font-size: 11px; padding: 3px 6px; height: 24px;"></select>
        <button id="addProjectBtn" class="btn-small" title="Create Profile" style="height: 24px; padding: 3px 6px;">➕</button>
        <button id="renameProjectBtn" class="btn-small" title="Rename Profile" style="height: 24px; padding: 3px 6px;">✏️</button>
        <button id="deleteProjectBtn" class="btn-small btn-small-danger" title="Delete Profile" style="height: 24px; padding: 3px 6px;">🗑️</button>
      </div>

      <!-- Compact Cloud Backup Buttons -->
      <div class="convex-buttons">
        <button id="saveToConvex" class="btn-convex-save" title="Backup configuration to Convex Cloud">💾 Backup</button>
        <button id="loadFromConvex" class="btn-convex-load" title="Restore configuration from Convex Cloud">📂 Restore</button>
      </div>
    </div>

    <!-- Compact Loop Config -->
    <div class="settings-card">
      <div class="settings-row">
        <div class="field">
          <label for="loopCount" title="Loop Count: enter -1 for infinite loops">Loops (-1 = ∞):</label>
          <input type="number" id="loopCount" value="1" min="-1" placeholder="1" style="width: 55px; text-align: center;" title="Loop Count (-1 = infinite)" />
        </div>
        <div class="field">
          <label for="loopDelay">Interval:</label>
          <div class="input-with-icon" title="Delay between loop iterations in seconds" style="width: 70px;">
            <span class="input-icon">⏱️</span>
            <input type="number" id="loopDelay" value="1" min="0" step="0.1" />
          </div>
        </div>
        <div class="field">
          <label for="waitTimeout" title="Timeout for Wait For Element steps. 0 = off">Timeout:</label>
          <div class="input-with-icon" title="Max time to wait for a matching element in seconds. 0 = off" style="width: 70px;">
            <span class="input-icon">⏲️</span>
            <input type="number" id="waitTimeout" value="0" min="0" step="0.1" />
          </div>
        </div>
      </div>
    </div>

    <!-- Action Sequences Section -->
    <div class="steps-section">
      <div class="section-header">
        <h2>Automation Steps</h2>
        <button id="addStepBtn" class="btn-secondary">➕ Add Step</button>
      </div>
      
      <div id="stepsList" class="steps-list">
        <!-- Injected via JavaScript -->
      </div>
    </div>

    <!-- Action Panel -->
    <div class="action-panel">
      <button id="toggleBtn" class="btn-primary">▶️ Start Automation</button>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
