<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { margin: 0; padding: 12px; width: 200px; font-family: sans-serif; background: #1e1e2e; color: #cdd6f4; }
    button { width: 100%; padding: 10px; background: #3b82f6; color: #fff; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; }
    button:hover { background: #2563eb; }
    p { font-size: 11px; margin: 8px 0 0; opacity: 0.6; text-align: center; }
  </style>
</head>
<body>
  <button id="btn">🔍 Pick Element</button>
  <p>Click button, then click any element on the page.</p>
  <script src="popup.js"></script>
</body>
</html>
