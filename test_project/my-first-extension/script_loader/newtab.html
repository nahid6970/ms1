<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Opening...</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap');

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background:
                radial-gradient(circle at top, #26324a 0%, #15171d 45%, #0e1015 100%);
            color: #d4d4d4;
            font-family: 'JetBrains Mono', monospace;
        }

        .card {
            width: min(520px, calc(100vw - 48px));
            padding: 24px;
            border: 1px solid #2f3542;
            border-radius: 12px;
            background: rgba(30, 34, 44, 0.92);
            box-shadow: 0 18px 50px rgba(0, 0, 0, 0.35);
        }

        .title {
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 10px;
            color: #9cdcfe;
        }

        .text {
            font-size: 12px;
            line-height: 1.6;
            color: #b9c1cc;
        }

        .link {
            color: #4fc3f7;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="title">Opening configured page...</div>
        <div class="text" id="statusText">Checking extension settings.</div>
    </div>

    <script src="newtab.js"></script>
</body>
</html>
