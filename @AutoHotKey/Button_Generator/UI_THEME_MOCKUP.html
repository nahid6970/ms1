<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CyberAHK Theme Mockup</title>
  <style>
    :root {
      --bg: #111418;
      --bg-2: #171c22;
      --surface: #1e242c;
      --surface-2: #252c36;
      --border: #33404f;
      --border-2: #405061;
      --text: #e8edf2;
      --muted: #9aa6b2;
      --primary: #5b8cff;
      --primary-strong: #3d73f1;
      --success: #2fbf71;
      --warning: #d7a12c;
      --danger: #df5f5f;
      --focus: rgba(91, 140, 255, 0.35);
      --shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
      --radius: 16px;
      --radius-sm: 12px;
      --space: 16px;
      --font: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(91, 140, 255, 0.14), transparent 28%),
        radial-gradient(circle at top right, rgba(47, 191, 113, 0.10), transparent 22%),
        linear-gradient(180deg, #0f1216 0%, #111418 100%);
      color: var(--text);
      font-family: var(--font);
    }

    .app {
      max-width: 1400px;
      margin: 0 auto;
      padding: 22px;
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      padding: 14px;
      background: rgba(30, 36, 44, 0.96);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      padding-right: 8px;
      font-weight: 700;
      font-size: 17px;
      letter-spacing: 0.2px;
      white-space: nowrap;
    }

    .brand-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--primary);
      box-shadow: 0 0 0 4px rgba(91, 140, 255, 0.14);
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text);
      font-size: 13px;
      white-space: nowrap;
    }

    .pill strong {
      color: #ffffff;
    }

    .select,
    .input {
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
      outline: none;
      min-height: 40px;
    }

    .select:focus,
    .input:focus {
      border-color: var(--border-2);
      box-shadow: 0 0 0 4px var(--focus);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface-2);
      color: var(--text);
      padding: 10px 14px;
      min-height: 40px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.12s ease, border-color 0.12s ease, background 0.12s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      border-color: var(--border-2);
      background: #2a3240;
    }

    .btn-primary {
      background: var(--primary);
      color: #07111f;
      border-color: transparent;
    }

    .btn-primary:hover {
      background: var(--primary-strong);
    }

    .btn-success {
      background: var(--success);
      color: #07190f;
      border-color: transparent;
    }

    .btn-warning {
      background: var(--warning);
      color: #1f1604;
      border-color: transparent;
    }

    .btn-danger {
      background: var(--danger);
      color: #250909;
      border-color: transparent;
    }

    .toolbar-spacer {
      flex: 1;
    }

    .layout {
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 18px;
      margin-top: 18px;
    }

    .panel {
      background: rgba(30, 36, 44, 0.96);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 18px;
      border-bottom: 1px solid rgba(51, 64, 79, 0.75);
      background: rgba(255, 255, 255, 0.02);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      font-weight: 700;
    }

    .panel-body {
      padding: 18px;
    }

    .settings-grid {
      display: grid;
      gap: 14px;
    }

    .setting {
      display: grid;
      gap: 8px;
    }

    .setting label {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.03em;
      text-transform: uppercase;
      font-weight: 700;
    }

    .help {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
    }

    .row-card {
      background: linear-gradient(180deg, rgba(37, 44, 54, 0.92), rgba(30, 36, 44, 0.92));
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 14px;
    }

    .row-header {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .row-title {
      font-size: 15px;
      font-weight: 700;
      color: #ffffff;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.03em;
    }

    .badge-primary {
      background: rgba(91, 140, 255, 0.15);
      color: #b9ceff;
    }

    .badge-success {
      background: rgba(47, 191, 113, 0.16);
      color: #9be5be;
    }

    .badge-warning {
      background: rgba(215, 161, 44, 0.18);
      color: #f0d18a;
    }

    .badge-danger {
      background: rgba(223, 95, 95, 0.16);
      color: #ffb5b5;
    }

    .row-grid {
      display: grid;
      grid-template-columns: minmax(120px, 1fr) minmax(220px, 2fr) minmax(160px, 1fr) auto;
      gap: 12px;
      align-items: center;
    }

    .utility-bar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .small {
      font-size: 12px;
      color: var(--muted);
    }

    .sidebar-block {
      padding: 16px;
      border-top: 1px solid rgba(51, 64, 79, 0.7);
    }

    .sidebar-title {
      margin: 0 0 12px;
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    @media (max-width: 980px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .row-grid {
        grid-template-columns: 1fr;
      }

      .toolbar-spacer {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="brand">
        <span class="brand-dot"></span>
        <span>CyberAHK Generator</span>
      </div>

      <span class="pill">Profile: <strong>BIO</strong></span>

      <select class="select" aria-label="Profile selector">
        <option>BIO</option>
        <option>Work</option>
        <option>School</option>
      </select>

      <button class="btn">New Profile</button>
      <button class="btn">New Row</button>
      <button class="btn">Reorder</button>

      <input class="input" style="min-width: 240px;" placeholder="Search rows or buttons" />

      <div class="toolbar-spacer"></div>

      <button class="btn btn-success">Generate</button>
      <button class="btn btn-warning">Launch</button>
      <button class="btn">Settings</button>
      <button class="btn">Restart</button>
    </div>

    <div class="layout">
      <aside class="panel">
        <div class="panel-header">
          <span>Settings</span>
          <span class="small">Compact</span>
        </div>

        <div class="panel-body">
          <div class="help">
            Professional theme direction: neutral surfaces, clearer spacing, and semantic colors for actions and alerts.
          </div>
        </div>

        <div class="sidebar-block">
          <h3 class="sidebar-title">Typography</h3>
          <div class="setting">
            <label>Font Family</label>
            <select class="select">
              <option>Segoe UI</option>
              <option>Inter</option>
              <option>Roboto</option>
              <option>Arial</option>
            </select>
          </div>
        </div>

        <div class="sidebar-block">
          <h3 class="sidebar-title">Defaults</h3>
          <div class="setting">
            <label>New Row Default</label>
            <select class="select">
              <option>Add default button</option>
              <option>Start empty</option>
            </select>
          </div>
        </div>
      </aside>

      <main class="panel">
        <div class="panel-header">
          <span>Rows</span>
          <span class="small">2 visible</span>
        </div>

        <div class="panel-body">
          <section class="row-card">
            <div class="row-header">
              <div class="row-title">Applicant Name</div>
              <span class="badge badge-primary">Send Text</span>
              <span class="badge badge-warning">Left Click</span>
            </div>

            <div class="row-grid">
              <input class="input" value="Label" />
              <input class="input" value="Nahid Ahmed" />
              <select class="select">
                <option selected>Send Text</option>
                <option>Copy Text</option>
                <option>No Action</option>
              </select>
              <div class="utility-bar">
                <button class="btn">BG</button>
                <button class="btn">TX</button>
                <button class="btn btn-danger">Del</button>
              </div>
            </div>
          </section>

          <section class="row-card">
            <div class="row-header">
              <div class="row-title">Certification</div>
              <span class="badge badge-success">Copy Text</span>
              <span class="badge badge-danger">Right Click</span>
            </div>

            <div class="row-grid">
              <input class="input" value="Label" />
              <input class="input" value="ABC-12345" />
              <select class="select">
                <option>Send Text</option>
                <option selected>Copy Text</option>
                <option>No Action</option>
              </select>
              <div class="utility-bar">
                <button class="btn">BG</button>
                <button class="btn">TX</button>
                <button class="btn btn-danger">Del</button>
              </div>
            </div>
          </section>
        </div>
      </main>
    </div>
  </div>
</body>
</html>
