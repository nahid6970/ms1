<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ludo Master</title>
    <style>
        :root {
            --red: #ff0000; --green: #00a000; --yellow: #ffff00; --blue: #0099ff;
            --white: #ffffff; --border: #333; --cell-size: 40px;
        }

        body {
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; background-color: #2c3e50; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white; gap: 20px;
        }

        #menu-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: flex; justify-content: center; align-items: center;
            z-index: 100; flex-direction: column; gap: 20px;
        }

        .menu-card {
            background: white; padding: 40px; border-radius: 20px; color: #333;
            text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); min-width: 300px;
        }

        .menu-btn {
            display: block; width: 100%; padding: 15px; margin: 10px 0;
            border: none; border-radius: 10px; font-size: 18px; font-weight: bold;
            cursor: pointer; transition: transform 0.2s, background 0.2s;
        }

        .btn-primary { background: #3498db; color: white; }
        .btn-success { background: #2ecc71; color: white; }
        .btn-player { background: #f1c40f; color: #333; margin: 5px; width: 60px; display: inline-block; }
        .menu-btn:hover { transform: scale(1.05); }

        .ludo-board {
            display: grid; grid-template-columns: repeat(15, var(--cell-size));
            grid-template-rows: repeat(15, var(--cell-size));
            background-color: var(--white); border: 2px solid var(--border);
            box-shadow: 0 0 50px rgba(0,0,0,0.3); position: relative;
        }

        .c { border: 0.5px solid #aaa; box-sizing: border-box; position: relative; }
        .home { grid-column: span 6; grid-row: span 6; display: flex; justify-content: center; align-items: center; padding: 30px; }
        .home-inner {
            background: white; width: 100%; height: 100%; display: grid;
            grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr;
            gap: 15px; padding: 15px; box-sizing: border-box; border: 1px solid rgba(0,0,0,0.1);
        }
        .slot { border: 1px solid rgba(0,0,0,0.1); position: relative; }

        .r-h { grid-area: 1 / 1 / 7 / 7; background: var(--red); }
        .g-h { grid-area: 1 / 10 / 7 / 16; background: var(--green); }
        .y-h { grid-area: 10 / 1 / 16 / 7; background: var(--yellow); }
        .b-h { grid-area: 10 / 10 / 16 / 16; background: var(--blue); }
        .red { background-color: var(--red); }
        .green { background-color: var(--green); }
        .yellow { background-color: var(--yellow); }
        .blue { background-color: var(--blue); }

        .center {
            grid-area: 7 / 7 / 10 / 10; position: relative; background: white;
            border: 1px solid var(--border); overflow: hidden;
        }
        .tri { position: absolute; width: 100%; height: 100%; }
        .t-r { background: var(--red); clip-path: polygon(0 0, 50% 50%, 0 100%); }
        .t-g { background: var(--green); clip-path: polygon(0 0, 100% 0, 50% 50%); }
        .t-y { background: var(--yellow); clip-path: polygon(0 100%, 50% 50%, 100% 100%); }
        .t-b { background: var(--blue); clip-path: polygon(100% 0, 100% 100%, 50% 50%); }

        .token {
            width: 32px; height: 32px; border-radius: 50%; border: 3px solid white;
            box-shadow: 0 4px 8px rgba(0,0,0,0.4); position: absolute;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 50; cursor: pointer; transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #dice-container {
            display: flex; flex-direction: column; align-items: center; gap: 10px;
            background: rgba(255,255,255,0.1); padding: 20px; border-radius: 20px; min-width: 250px;
        }
        #dice {
            width: 80px; height: 80px; background: white; border: 4px solid #333;
            border-radius: 18px; display: flex; justify-content: center; align-items: center;
            font-size: 44px; font-weight: bold; color: #333; box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }
        #roll-btn {
            padding: 12px 40px; background: #e74c3c; color: white; border: none;
            border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 18px;
            box-shadow: 0 4px 0 #c0392b; min-width: 180px;
        }
        #roll-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #c0392b; }
        #roll-btn:disabled { background: #95a5a6; cursor: not-allowed; opacity: 0.6; box-shadow: none; }
        
        .hidden { display: none !important; }
        .pulse { animation: pulse 0.8s infinite alternate; }
        @keyframes pulse {
            from { transform: translate(-50%, -50%) scale(1); filter: brightness(1.2); }
            to { transform: translate(-50%, -50%) scale(1.2); filter: brightness(1.5); }
        }
    </style>
</head>
<body>

<div id="menu-overlay">
    <div id="main-menu" class="menu-card">
        <h2>Ludo Master</h2>
        <button id="btn-continue" class="menu-btn btn-primary hidden">CONTINUE GAME</button>
        <button id="btn-new-game" class="menu-btn btn-success">NEW GAME</button>
    </div>
    <div id="player-select" class="menu-card hidden">
        <h2>Select Players</h2>
        <div>
            <button class="menu-btn btn-player" onclick="startGame(2)">2</button>
            <button class="menu-btn btn-player" onclick="startGame(3)">3</button>
            <button class="menu-btn btn-player" onclick="startGame(4)">4</button>
        </div>
        <button onclick="showMainMenu()" class="menu-btn">Back</button>
    </div>
</div>

<div class="ludo-board" id="board">
    <div class="home r-h"><div class="home-inner"><div class="slot" id="r-0"></div><div class="slot" id="r-1"></div><div class="slot" id="r-2"></div><div class="slot" id="r-3"></div></div></div>
    <div class="home g-h"><div class="home-inner"><div class="slot" id="g-0"></div><div class="slot" id="g-1"></div><div class="slot" id="g-2"></div><div class="slot" id="g-3"></div></div></div>
    <div class="home y-h"><div class="home-inner"><div class="slot" id="y-0"></div><div class="slot" id="y-1"></div><div class="slot" id="y-2"></div><div class="slot" id="y-3"></div></div></div>
    <div class="home b-h"><div class="home-inner"><div class="slot" id="b-0"></div><div class="slot" id="b-1"></div><div class="slot" id="b-2"></div><div class="slot" id="b-3"></div></div></div>
    <div class="center"><div class="tri t-r"></div><div class="tri t-g"></div><div class="tri t-y"></div><div class="tri t-b"></div></div>
</div>

<div id="dice-container">
    <div id="player-turn-indicator" style="font-size: 24px; font-weight: bold; text-shadow: 0 2px 4px rgba(0,0,0,0.5);">Turn: Red</div>
    <div id="dice">1</div>
    <button id="roll-btn">ROLL DICE</button>
</div>

<script type="module">
    import { ConvexHttpClient } from "https://esm.sh/convex@1.16.0/browser";
    const client = new ConvexHttpClient("https://silent-scorpion-207.convex.cloud");

    const diceEl = document.getElementById('dice');
    const rollBtn = document.getElementById('roll-btn');
    const turnIndicator = document.getElementById('player-turn-indicator');
    const colors = ['Red', 'Green', 'Yellow', 'Blue'];

    const START_INDEX = { 'red': 1, 'green': 14, 'yellow': 40, 'blue': 27 };
    const SAFE_SQUARES = [1, 9, 14, 22, 27, 35, 40, 48];
    let lastProcessedTurnId = "";

    async function updateUI() {
        const state = await client.query("game:getGameState");
        if (!state) return;

        diceEl.innerText = state.diceValue;
        const activeColor = colors[state.currentPlayer];
        turnIndicator.innerText = `Turn: ${activeColor}`;
        turnIndicator.style.color = `var(--${activeColor.toLowerCase()})`;
        diceEl.style.backgroundColor = `var(--${activeColor.toLowerCase()})`;
        diceEl.style.color = activeColor === 'Yellow' ? '#333' : 'white';
        
        const validMoves = [];
        state.tokens.forEach((t, i) => {
            if (Math.floor(i/4) === state.currentPlayer) {
                if (t.pos === -1) { if (state.diceValue === 6) validMoves.push(i); }
                else if (t.pos + state.diceValue <= 57) { validMoves.push(i); }
            }
        });

        if (state.waitingForRoll) {
            rollBtn.disabled = false;
            rollBtn.innerText = "ROLL DICE";
            lastProcessedTurnId = state.turnId; // Ready for next roll
        } else {
            rollBtn.disabled = true;
            rollBtn.innerText = "SELECT TOKEN";

            // Process auto-action ONLY ONCE per turn state
            if (lastProcessedTurnId !== state.turnId) {
                lastProcessedTurnId = state.turnId;
                setTimeout(async () => {
                    if (validMoves.length === 0) {
                        await client.mutation("game:skipTurn", { playerIndex: state.currentPlayer });
                        updateUI();
                    } else if (validMoves.length === 1) {
                        await client.mutation("game:moveToken", { tokenIndex: validMoves[0] });
                        updateUI();
                    }
                }, 1000);
            }
        }

        renderTokens(state, validMoves);
    }

    function renderTokens(state, validMoves) {
        document.querySelectorAll('.token').forEach(el => el.remove());
        state.tokens.forEach((t, i) => {
            const playerIdx = Math.floor(i / 4);
            let parent;
            if (t.pos === -1) parent = document.getElementById(`${t.player[0]}-${i % 4}`);
            else if (t.pos >= 52) parent = document.getElementById(`stretch-${t.player}-${t.pos - 52}`);
            else parent = document.getElementById(`path-${(t.pos + START_INDEX[t.player]) % 52}`);

            if (parent) {
                const token = document.createElement('div');
                token.className = `token ${t.player}`;
                token.style.background = `var(--${t.player})`;
                if (!state.waitingForRoll && validMoves.includes(i)) {
                    token.classList.add('pulse');
                    token.onclick = async () => {
                        await client.mutation("game:moveToken", { tokenIndex: i });
                        updateUI();
                    };
                }
                parent.appendChild(token);
            }
        });
    }

    rollBtn.onclick = async () => {
        const state = await client.query("game:getGameState");
        await client.mutation("game:rollDice", { playerIndex: state.currentPlayer });
        updateUI();
    };

    window.startGame = async (num) => {
        await client.mutation("game:startNewGame", { numPlayers: num });
        document.getElementById('menu-overlay').classList.add('hidden');
        updateUI();
    };

    document.getElementById('btn-new-game').onclick = () => {
        document.getElementById('main-menu').classList.add('hidden');
        document.getElementById('player-select').classList.remove('hidden');
    };

    window.showMainMenu = () => {
        document.getElementById('main-menu').classList.remove('hidden');
        document.getElementById('player-select').classList.add('hidden');
    };

    document.getElementById('btn-continue').onclick = () => {
        document.getElementById('menu-overlay').classList.add('hidden');
        updateUI();
    };

    function generateBoard() {
        const board = document.getElementById('board');
        const PATH = [
            {r:7, c:1}, {r:7, c:2}, {r:7, c:3}, {r:7, c:4}, {r:7, c:5}, {r:7, c:6},
            {r:6, c:7}, {r:5, c:7}, {r:4, c:7}, {r:3, c:7}, {r:2, c:7}, {r:1, c:7}, {r:1, c:8}, {r:1, c:9},
            {r:2, c:9}, {r:3, c:9}, {r:4, c:9}, {r:5, c:9}, {r:6, c:9},
            {r:7, c:10}, {r:7, c:11}, {r:7, c:12}, {r:7, c:13}, {r:7, c:14}, {r:7, c:15}, {r:8, c:15}, {r:9, c:15},
            {r:9, c:14}, {r:9, c:13}, {r:9, c:12}, {r:9, c:11}, {r:9, c:10},
            {r:10, c:9}, {r:11, c:9}, {r:12, c:9}, {r:13, c:9}, {r:14, c:9}, {r:15, c:9}, {r:15, c:8}, {r:15, c:7},
            {r:14, c:7}, {r:13, c:7}, {r:12, c:7}, {r:11, c:7}, {r:10, c:7},
            {r:9, c:6}, {r:9, c:5}, {r:9, c:4}, {r:9, c:3}, {r:9, c:2}, {r:9, c:1}, {r:8, c:1}
        ];
        PATH.forEach((p, i) => {
            const cell = document.createElement('div');
            cell.className = 'c'; cell.id = `path-${i}`;
            cell.style.gridRow = p.r; cell.style.gridColumn = p.c;
            if (i === 1) cell.classList.add('red');
            if (i === 14) cell.classList.add('green');
            if (i === 27) cell.classList.add('blue');
            if (i === 40) cell.classList.add('yellow');
            board.appendChild(cell);
        });

        const HOME_STRETCH = {
            'red': [{r:8, c:2}, {r:8, c:3}, {r:8, c:4}, {r:8, c:5}, {r:8, c:6}],
            'green': [{r:2, c:8}, {r:3, c:8}, {r:4, c:8}, {r:5, c:8}, {r:6, c:8}],
            'yellow': [{r:14, c:8}, {r:13, c:8}, {r:12, c:8}, {r:11, c:8}, {r:10, c:8}],
            'blue': [{r:8, c:14}, {r:8, c:13}, {r:8, c:12}, {r:8, c:11}, {r:8, c:10}]
        };

        Object.keys(HOME_STRETCH).forEach(color => {
            HOME_STRETCH[color].forEach((p, i) => {
                const cell = document.createElement('div');
                cell.className = `c ${color}`; cell.id = `stretch-${color}-${i}`;
                cell.style.gridRow = p.r; cell.style.gridColumn = p.c;
                board.appendChild(cell);
            });
        });

        for (let r=1; r<=15; r++) {
            for (let c=1; c<=15; c++) {
                const isHome = (r<=6 && c<=6) || (r<=6 && c>=10) || (r>=10 && c<=6) || (r>=10 && c>=10);
                const isCenter = (r>=7 && r<=9 && c>=7 && c<=9);
                if (!isHome && !isCenter) {
                    const exists = document.querySelector(`.c[style*="grid-row: ${r}"][style*="grid-column: ${c}"]`);
                    if (!exists) {
                        const cell = document.createElement('div');
                        cell.className = 'c';
                        cell.style.gridRow = r; cell.style.gridColumn = c;
                        board.appendChild(cell);
                    }
                }
            }
        }
    }

    generateBoard();
    updateUI();
    setInterval(updateUI, 2000);

    const checkContinue = async () => {
        const state = await client.query("game:getGameState");
        if (state && state.status === "playing") document.getElementById('btn-continue').classList.remove('hidden');
    };
    checkContinue();
</script>

</body>
</html>

    };
    checkContinue();
</script>

</body>
</html>
