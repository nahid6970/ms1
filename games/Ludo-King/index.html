<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/7101/7101743.png">
    <title>Ludo Master</title>
    <style>
        :root {
            --red: #ff0000; --green: #00a000; --yellow: #e6ac00; --blue: #0099ff;
            --white: #ffffff; --border: #333; --cell-size: 40px;
        }

        body {
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; background-color: #2c3e50; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white; gap: 20px;
        }

        #menu-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: flex; justify-content: center; align-items: center;
            z-index: 1000; flex-direction: column; gap: 20px;
        }

        .menu-card {
            background: white; padding: 40px; border-radius: 20px; color: #333;
            text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); min-width: 300px;
        }

        .menu-btn {
            display: block; width: 100%; padding: 15px; margin: 10px 0;
            border: none; border-radius: 10px; font-size: 18px; font-weight: bold;
            cursor: pointer; transition: transform 0.2s, background 0.2s;
        }

        .btn-primary { background: #3498db; color: white; }
        .btn-success { background: #2ecc71; color: white; }
        .btn-player { background: #f1c40f; color: #333; margin: 5px; width: 60px; display: inline-block; }
        .menu-btn:hover { transform: scale(1.05); }

        .ludo-board {
            display: grid; grid-template-columns: repeat(15, var(--cell-size));
            grid-template-rows: repeat(15, var(--cell-size));
            background-color: var(--white); border: 2px solid var(--border);
            box-shadow: 0 0 50px rgba(0,0,0,0.3); position: relative;
        }

        .c { border: 0.5px solid #aaa; box-sizing: border-box; position: relative; }
        .home { grid-column: span 6; grid-row: span 6; display: flex; justify-content: center; align-items: center; padding: 30px; }
        .home-inner {
            background: white; width: 100%; height: 100%; display: grid;
            grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr;
            gap: 15px; padding: 15px; box-sizing: border-box; border: 1px solid rgba(0,0,0,0.1);
        }
        .slot { border: 1px solid rgba(0,0,0,0.1); position: relative; }

        .r-h { grid-area: 1 / 1 / 7 / 7; background: var(--red); }
        .g-h { grid-area: 1 / 10 / 7 / 16; background: var(--green); }
        .y-h { grid-area: 10 / 1 / 16 / 7; background: var(--yellow); }
        .b-h { grid-area: 10 / 10 / 16 / 16; background: var(--blue); }
        
        .path-color.red { background-color: var(--red); }
        .path-color.green { background-color: var(--green); }
        .path-color.yellow { background-color: var(--yellow); }
        .path-color.blue { background-color: var(--blue); }

        .center {
            grid-area: 7 / 7 / 10 / 10; position: relative; background: white;
            border: 1px solid var(--border); overflow: hidden;
        }
        .tri { position: absolute; width: 100%; height: 100%; }
        .t-r { background: var(--red); clip-path: polygon(0 0, 50% 50%, 0 100%); }
        .t-g { background: var(--green); clip-path: polygon(0 0, 100% 0, 50% 50%); }
        .t-y { background: var(--yellow); clip-path: polygon(0 100%, 50% 50%, 100% 100%); }
        .t-b { background: var(--blue); clip-path: polygon(100% 0, 100% 100%, 50% 50%); }

        .star {
            position: absolute; top: 15%; left: 15%; width: 70%; height: 70%;
            fill: rgba(0,0,0,0.4); z-index: 1; pointer-events: none;
        }

        .token {
            width: 24px; height: 24px;
            cursor: pointer;
            position: absolute;
            top: 50%; left: 50%;
            /* Center the base of the pin */
            transform: translate(-50%, -85%);
            transition: all 0.2s ease-out;
            z-index: 50;
            pointer-events: auto;
        }
        .token svg { width: 100%; height: 100%; filter: drop-shadow(0 4px 4px rgba(0,0,0,0.4)); }
        
        .token.active-player svg {
             filter: drop-shadow(0 0 8px currentColor) drop-shadow(0 4px 4px rgba(0,0,0,0.5));
             transform: scale(1.1);
        }

        .token.pulse svg {
            animation: bounce 1.5s infinite alternate;
        }
        @keyframes bounce { 
            from { transform: translateY(0); }
            to { transform: translateY(-5px); }
        }

        /* Color the internal circle of the pin */
        .token.red .pin-core { fill: var(--red); }
        .token.green .pin-core { fill: var(--green); }
        .token.yellow .pin-core { fill: var(--yellow); }
        .token.blue .pin-core { fill: var(--blue); }

        /* Center offsets for victory tokens */
        .t-r .token { left: 25%; }
        .t-g .token { top: 25%; }
        .t-y .token { top: 75%; }
        .t-b .token { left: 75%; }


        #dice-container {
            display: flex; flex-direction: column; align-items: center; gap: 10px;
            background: rgba(255,255,255,0.1); padding: 20px; border-radius: 20px; min-width: 250px;
        }
        #dice {
            width: 80px; height: 80px; background: white; border: 4px solid #333;
            border-radius: 18px; display: flex; justify-content: center; align-items: center;
            font-size: 44px; font-weight: bold; color: #333; box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            cursor: pointer; transition: transform 0.1s, box-shadow 0.1s, background-color 0.3s;
        }
        #dice:hover:not(.disabled) { transform: translateY(-5px); box-shadow: 0 12px 25px rgba(0,0,0,0.5); }
        #dice:active:not(.disabled) { transform: translateY(2px); box-shadow: 0 4px 10px rgba(0,0,0,0.4); }
        #dice.disabled { cursor: not-allowed; opacity: 0.8; filter: grayscale(0.5); }
        
        #test-controls { display: grid; grid-template-columns: repeat(10, 1fr); gap: 5px; margin-top: 15px; }
        .test-btn {
            padding: 5px; background: #9b59b6; color: white; border: none; border-radius: 4px;
            font-weight: bold; cursor: pointer; transition: background 0.2s; font-size: 11px;
        }

        .test-btn:hover { background: #8e44ad; }
        .test-btn:active { transform: translateY(2px); }

        .btn-test-mode { background: #9b59b6; color: white; }
        
        .shake { animation: shake 0.4s ease-in-out; }
        @keyframes shake {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(15deg) scale(1.1); }
            50% { transform: rotate(-15deg) scale(1.1); }
            75% { transform: rotate(10deg) scale(1.05); }
            100% { transform: rotate(0deg) scale(1); }
        }
        
        .pulse { animation: pulse 0.8s infinite alternate; }
        @keyframes pulse {
            from { transform: translate(-50%, -50%) scale(1); filter: brightness(1.2); }
            to { transform: translate(-50%, -50%) scale(1.2); filter: brightness(1.5); }
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="menu-overlay">
    <div id="main-menu" class="menu-card">
        <h2>Ludo Master</h2>
        <button id="btn-continue" class="menu-btn btn-primary hidden">CONTINUE GAME</button>
        <button id="btn-new-game" class="menu-btn btn-success">NEW GAME</button>
        <button id="btn-testing" class="menu-btn btn-test-mode">TESTING MODE</button>
    </div>
    <div id="player-select" class="menu-card hidden">
        <h2>Select Players</h2>
        <div>
            <button class="menu-btn btn-player" onclick="startGame(1)">1</button>
            <button class="menu-btn btn-player" onclick="startGame(2)">2</button>
            <button class="menu-btn btn-player" onclick="startGame(3)">3</button>
            <button class="menu-btn btn-player" onclick="startGame(4)">4</button>
        </div>
        <button onclick="showMainMenu()" class="menu-btn">Back</button>
    </div>
</div>

<div class="ludo-board" id="board">
    <div class="home r-h"><div class="home-inner"><div class="slot" id="r-0"></div><div class="slot" id="r-1"></div><div class="slot" id="r-2"></div><div class="slot" id="r-3"></div></div></div>
    <div class="home g-h"><div class="home-inner"><div class="slot" id="g-0"></div><div class="slot" id="g-1"></div><div class="slot" id="g-2"></div><div class="slot" id="g-3"></div></div></div>
    <div class="home b-h"><div class="home-inner"><div class="slot" id="b-0"></div><div class="slot" id="b-1"></div><div class="slot" id="b-2"></div><div class="slot" id="b-3"></div></div></div>
    <div class="home y-h"><div class="home-inner"><div class="slot" id="y-0"></div><div class="slot" id="y-1"></div><div class="slot" id="y-2"></div><div class="slot" id="y-3"></div></div></div>
    <div class="center"><div class="tri t-r"></div><div class="tri t-g"></div><div class="tri t-y"></div><div class="tri t-b"></div></div>
</div>

<div id="dice-container">
    <div id="dice">1</div>
    <div id="test-controls" class="hidden">
        <button class="test-btn" onclick="testRoll(1)">1</button>
        <button class="test-btn" onclick="testRoll(2)">2</button>
        <button class="test-btn" onclick="testRoll(3)">3</button>
        <button class="test-btn" onclick="testRoll(4)">4</button>
        <button class="test-btn" onclick="testRoll(5)">5</button>
        <button class="test-btn" onclick="testRoll(6)">6</button>
        <button class="test-btn" onclick="testRoll(7)">7</button>
        <button class="test-btn" onclick="testRoll(8)">8</button>
        <button class="test-btn" onclick="testRoll(9)">9</button>
        <button class="test-btn" onclick="testRoll(10)">10</button>
        <button class="test-btn" onclick="testRoll(11)">11</button>
        <button class="test-btn" onclick="testRoll(12)">12</button>
        <button class="test-btn" onclick="testRoll(13)">13</button>
        <button class="test-btn" onclick="testRoll(14)">14</button>
        <button class="test-btn" onclick="testRoll(15)">15</button>
        <button class="test-btn" onclick="testRoll(16)">16</button>
        <button class="test-btn" onclick="testRoll(17)">17</button>
        <button class="test-btn" onclick="testRoll(18)">18</button>
        <button class="test-btn" onclick="testRoll(19)">19</button>
        <button class="test-btn" onclick="testRoll(20)">20</button>
    </div>
</div>

<script type="module">
    import { ConvexHttpClient } from "https://esm.sh/convex@1.16.0/browser";
    const client = new ConvexHttpClient("https://silent-scorpion-207.convex.cloud");

    const diceEl = document.getElementById('dice');
    const colors = ['Red', 'Green', 'Blue', 'Yellow'];
    const START_INDEX = { 'red': 1, 'green': 14, 'yellow': 40, 'blue': 27 };
    const START_INDEXES = [1, 14, 27, 40];
    const SAFE_SQUARES = [1, 9, 14, 22, 27, 35, 40, 48];
    const MAX_POS = 56; 
    let lastProcessedTurnId = "";
    let localState = null;
    let isRolling = false;
    let isTesting = false;

    const STAR_SVG = `<svg class="star" viewBox="0 0 24 24"><path d="M12,17.27L18.18,21L16.54,13.97L22,9.24L14.81,8.62L12,2L9.19,8.62L2,9.24L7.45,13.97L5.82,21L12,17.27Z"/></svg>`;
    const PIN_SVG = `
        <svg viewBox="0 0 100 120">
            <path d="M50,10 C30,10 15,25 15,45 C15,75 50,115 50,115 C50,115 85,75 85,45 C85,25 70,10 50,10 Z" fill="white" stroke="#666" stroke-width="1.5" />
            <circle class="pin-core" cx="50" cy="45" r="23" />
        </svg>
    `;

    function getAbsPos(playerIdx, relativePos) {
        if (relativePos === -1 || relativePos >= 52) return -1;
        return (relativePos + START_INDEXES[playerIdx]) % 52;
    }

    function getNextPlayer(curr, total) {
        if (total === 2) return curr === 1 ? 3 : 1;
        return (curr + 1) % total;
    }

    async function updateGameState(patch) {
        if (!localState) return;
        localState = { ...localState, ...patch, timestamp: Date.now() };
        renderUI(localState);
        await client.mutation("game:setState", { patch: localState });
    }

    async function updateUI() {
        const state = await client.query("game:getGameState");
        if (!state) return;
        
        // Prevent "Revert-Flicker": Only update if the server state is actually NEWER 
        // than our local state, based on turnId (which we set to current timestamp).
        const serverTurnId = parseInt(state.turnId) || 0;
        const localTurnId = localState ? (parseInt(localState.turnId) || 0) : 0;

        if (!localState || serverTurnId > localTurnId) {
            localState = state;
            renderUI(state);
        } else if (serverTurnId === localTurnId) {
            // If same turn, check if the server has a newer timestamp (e.g. from a different player)
            if (state.timestamp > localState.timestamp) {
                localState = state;
                renderUI(state);
            }
        }
    }


    function renderUI(state) {
        if (!state) return;

        diceEl.innerText = state.diceValue;
        const activeColor = colors[state.currentPlayer];
        diceEl.style.backgroundColor = `var(--${activeColor.toLowerCase()})`;
        diceEl.style.color = 'white';
        
        const validMoves = [];
        state.tokens.forEach((t, i) => {
            if (Math.floor(i/4) === state.currentPlayer) {
                if (t.pos === -1) { if (state.diceValue === 6) validMoves.push(i); }
                else if (t.pos + state.diceValue <= MAX_POS) { validMoves.push(i); }
            }
        });

        if (state.waitingForRoll) {
            diceEl.classList.remove('disabled');
            if (isTesting) document.getElementById('test-controls').classList.remove('hidden');
            lastProcessedTurnId = state.turnId;
        } else {
            diceEl.classList.add('disabled');
            document.getElementById('test-controls').classList.add('hidden');
            // Turn automation: only if turnId is new to avoid "speedrun" loops
            if (lastProcessedTurnId !== state.turnId) {
                lastProcessedTurnId = state.turnId;
                if (validMoves.length === 0) {
                    setTimeout(() => localSkipTurn(state.currentPlayer), 1200);
                } else if (validMoves.length === 1) {
                    setTimeout(() => localMoveToken(validMoves[0]), 1200);
                }
            }
        }

        renderTokens(state, validMoves);
    }

    function renderTokens(state, validMoves) {
        state.tokens.forEach((t, i) => {
            const playerIdx = Math.floor(i / 4);
            
            // Check if player is actually in the game
            let isActive = true;
            if (state.numPlayers === 2) isActive = (playerIdx === 1 || playerIdx === 3);
            else if (state.numPlayers === 3) isActive = (playerIdx < 3);

            let token = document.getElementById(`token-${i}`);
            if (!isActive) {
                if (token) token.remove();
                return;
            }

            let parent;
            if (t.pos === -1) {
                parent = document.getElementById(`${t.player[0]}-${i % 4}`);
            } else if (t.pos === MAX_POS) {
                // TOKEN FINISHED (Goes to the matching center triangle)
                const triMap = { red: 'r', green: 'g', yellow: 'y', blue: 'b' };
                parent = document.querySelector(`.center .t-${triMap[t.player]}`);
            } else if (t.pos >= 51) {
                parent = document.getElementById(`stretch-${t.player}-${t.pos - 51}`);
            } else {
                parent = document.getElementById(`path-${(t.pos + START_INDEX[t.player]) % 52}`);
            }





            if (parent) {
                if (!token) {
                    token = document.createElement('div');
                    token.id = `token-${i}`;
                    token.className = `token ${t.player}`;
                    token.innerHTML = PIN_SVG;
                    token.style.color = `var(--${t.player})`; 
                }
                
                const isCurrentTurn = state.currentPlayer === playerIdx;
                if (isCurrentTurn) token.classList.add('active-player');
                else token.classList.remove('active-player');

                const isClickable = !state.waitingForRoll && validMoves.includes(i);
                if (isClickable) {
                    token.classList.add('pulse');
                    token.onclick = () => localMoveToken(i);
                } else {
                    token.classList.remove('pulse');
                    token.onclick = null;
                }

                // Testing Mode: Right click to move backwards
                token.oncontextmenu = (e) => {
                    e.preventDefault();
                    if (isTesting) localMoveBack(i);
                };

                if (token.parentElement !== parent) {
                    parent.appendChild(token);
                }

                // Dynamic Scaling & Overlap Handling
                let scale = isCurrentTurn ? 1.2 : 1.0;
                let offset = { x: 0, y: 0 };

                if (!parent.closest('.center')) {
                    const siblings = Array.from(parent.querySelectorAll('.token'));
                    const count = siblings.length;
                    const index = siblings.indexOf(token);
                    
                    if (count > 1) {
                        scale *= 0.75; // Moderate shrink
                        offset.x = (index % 2 === 0 ? -10 : 10);
                        offset.y = (index > 1 ? 10 : -10);
                    }
                    token.style.zIndex = 50 + index + (isCurrentTurn ? 100 : 0);
                }

                token.style.transform = `translate(calc(-50% + ${offset.x}px), calc(-50% + ${offset.y}px)) scale(${scale})`;
            }
        });


        // Cleanup stale tokens
        document.querySelectorAll('.token').forEach(el => {
            const id = parseInt(el.id.replace('token-', ''));
            const playerIdx = Math.floor(id / 4);
            let isActive = true;
            if (state.numPlayers === 2) isActive = (playerIdx === 1 || playerIdx === 3);
            else if (state.numPlayers === 3) isActive = (playerIdx < 3);

            if (isNaN(id) || id >= state.tokens.length || !isActive) el.remove();
        });
    }



    async function localRollDice(playerIndex) {
        if (!localState || !localState.waitingForRoll || localState.currentPlayer !== playerIndex || isRolling) return;
        if (isTesting) return; // Dice click ignored in testing mode (use buttons)
        isRolling = true;
        diceEl.classList.add('disabled');

        // Visual rolling effect
        let rollCount = 0;
        const rollInterval = setInterval(() => {
            diceEl.innerText = Math.floor(Math.random() * 6) + 1;
            rollCount++;
            if (rollCount > 10) clearInterval(rollInterval);
        }, 500 / 10);

        const diceValue = Math.floor(Math.random() * 6) + 1;
        
        // Wait for the animation to finish
        setTimeout(async () => {
            let sixCount = localState.sixCount;
            if (diceValue === 6) sixCount++; else sixCount = 0;

            if (sixCount === 3) {
                await updateGameState({
                    diceValue, sixCount: 0,
                    currentPlayer: getNextPlayer(localState.currentPlayer, localState.numPlayers),
                    waitingForRoll: true,
                    turnId: Date.now().toString(),
                });
                return;
            }

            await updateGameState({ 
                diceValue, 
                sixCount, 
                waitingForRoll: false,
                turnId: Date.now().toString() 
            });
            isRolling = false;
        }, 600);
    }

    async function localMoveToken(tokenIndex) {
        if (!localState || localState.waitingForRoll) return;

        const playerIndex = Math.floor(tokenIndex / 4);
        if (playerIndex !== localState.currentPlayer) return;

        const tokens = [...localState.tokens.map(t => ({...t}))];
        const token = tokens[tokenIndex];
        let extraTurn = false;

        if (token.pos === -1) {
            if (localState.diceValue === 6) { token.pos = 0; extraTurn = true; }
            else return;
        } else {
            const newPos = token.pos + localState.diceValue;
            if (newPos <= MAX_POS) {
                token.pos = newPos;
                if (localState.diceValue === 6) extraTurn = true;
                if (newPos === MAX_POS) extraTurn = true; // Bonus for reaching home
            } else return;
        }

        // Capture Logic
        const myAbsPos = getAbsPos(localState.currentPlayer, token.pos);
        const isAtSafeSquare = SAFE_SQUARES.includes(myAbsPos);

        if (myAbsPos !== -1 && !isAtSafeSquare) {
            for (let i = 0; i < tokens.length; i++) {
                const otherPlayerIdx = Math.floor(i / 4);
                if (otherPlayerIdx !== localState.currentPlayer) {
                    const otherAbsPos = getAbsPos(otherPlayerIdx, tokens[i].pos);
                    if (otherAbsPos === myAbsPos) {
                        tokens[i].pos = -1; // Capture!
                        extraTurn = true; 
                    }
                }
            }
        }

        let nextPlayer = localState.currentPlayer;
        if (!extraTurn) nextPlayer = getNextPlayer(localState.currentPlayer, localState.numPlayers);

        await updateGameState({
            tokens,
            currentPlayer: nextPlayer,
            waitingForRoll: true,
            sixCount: extraTurn ? localState.sixCount : 0,
            turnId: Date.now().toString(),
        });
    }

    async function localMoveBack(tokenIndex) {
        if (!localState) return;
        const tokens = [...localState.tokens.map(t => ({...t}))];
        const token = tokens[tokenIndex];
        
        if (token.pos > -1) {
            token.pos--;
            await updateGameState({ tokens, turnId: Date.now().toString() });
        }
    }


    async function localSkipTurn(playerIndex) {
        if (!localState || localState.waitingForRoll || localState.currentPlayer !== playerIndex) return;
        await updateGameState({
            currentPlayer: getNextPlayer(localState.currentPlayer, localState.numPlayers),
            waitingForRoll: true,
            sixCount: 0,
            turnId: Date.now().toString(),
        });
    }

    diceEl.onclick = () => {
        if (localState && localState.waitingForRoll && !isRolling) {
            diceEl.classList.add('shake');
            setTimeout(() => diceEl.classList.remove('shake'), 400);
            localRollDice(localState.currentPlayer);
        }
    };

    window.startGame = async (num) => {
        let firstPlayer = 0;
        if (num === 2) firstPlayer = 1;

        const initialState = {
            status: "playing",
            numPlayers: num,
            currentPlayer: firstPlayer, 
            diceValue: 1,
            waitingForRoll: true,
            sixCount: 0,
            turnId: Date.now().toString(),
            tokens: [
                { player: 'red', pos: -1 }, { player: 'red', pos: -1 }, { player: 'red', pos: -1 }, { player: 'red', pos: -1 },
                { player: 'green', pos: -1 }, { player: 'green', pos: -1 }, { player: 'green', pos: -1 }, { player: 'green', pos: -1 },
                { player: 'blue', pos: -1 }, { player: 'blue', pos: -1 }, { player: 'blue', pos: -1 }, { player: 'blue', pos: -1 },
                { player: 'yellow', pos: -1 }, { player: 'yellow', pos: -1 }, { player: 'yellow', pos: -1 }, { player: 'yellow', pos: -1 },
            ],
            timestamp: Date.now(),
        };

        localState = initialState;
        renderUI(localState);
        await client.mutation("game:setState", { patch: localState });
        document.getElementById('menu-overlay').classList.add('hidden');
    };

    window.testRoll = async (val) => {
        if (!localState || !localState.waitingForRoll) return;
        let sixCount = localState.sixCount;
        if (val === 6) sixCount++; else sixCount = 0;

        if (sixCount === 3) {
            await updateGameState({
                diceValue: val, sixCount: 0,
                currentPlayer: getNextPlayer(localState.currentPlayer, localState.numPlayers),
                waitingForRoll: true,
                turnId: Date.now().toString(),
            });
            return;
        }
        await updateGameState({ diceValue: val, sixCount, waitingForRoll: false, turnId: Date.now().toString() });
    };

    document.getElementById('btn-testing').onclick = () => {
        isTesting = true;
        document.getElementById('main-menu').classList.add('hidden');
        document.getElementById('player-select').classList.remove('hidden');
    };


    function generateBoard() {
        const board = document.getElementById('board');
        const PATH = [
            {r:7, c:1}, {r:7, c:2}, {r:7, c:3}, {r:7, c:4}, {r:7, c:5}, {r:7, c:6},
            {r:6, c:7}, {r:5, c:7}, {r:4, c:7}, {r:3, c:7}, {r:2, c:7}, {r:1, c:7}, {r:1, c:8}, {r:1, c:9},
            {r:2, c:9}, {r:3, c:9}, {r:4, c:9}, {r:5, c:9}, {r:6, c:9},
            {r:7, c:10}, {r:7, c:11}, {r:7, c:12}, {r:7, c:13}, {r:7, c:14}, {r:7, c:15}, {r:8, c:15}, {r:9, c:15},
            {r:9, c:14}, {r:9, c:13}, {r:9, c:12}, {r:9, c:11}, {r:9, c:10},
            {r:10, c:9}, {r:11, c:9}, {r:12, c:9}, {r:13, c:9}, {r:14, c:9}, {r:15, c:9}, {r:15, c:8}, {r:15, c:7},
            {r:14, c:7}, {r:13, c:7}, {r:12, c:7}, {r:11, c:7}, {r:10, c:7},
            {r:9, c:6}, {r:9, c:5}, {r:9, c:4}, {r:9, c:3}, {r:9, c:2}, {r:9, c:1}, {r:8, c:1}
        ];
        PATH.forEach((p, i) => {
            const cell = document.createElement('div');
            cell.className = 'c'; cell.id = `path-${i}`;
            cell.style.gridRow = p.r; cell.style.gridColumn = p.c;
            if (i === 1) cell.classList.add('path-color', 'red');
            if (i === 14) cell.classList.add('path-color', 'green');
            if (i === 27) cell.classList.add('path-color', 'blue');
            if (i === 40) cell.classList.add('path-color', 'yellow');
            if (SAFE_SQUARES.includes(i)) cell.innerHTML = STAR_SVG;
            board.appendChild(cell);
        });

        const HOME_STRETCH = {
            'red': [{r:8, c:2}, {r:8, c:3}, {r:8, c:4}, {r:8, c:5}, {r:8, c:6}],
            'green': [{r:2, c:8}, {r:3, c:8}, {r:4, c:8}, {r:5, c:8}, {r:6, c:8}],
            'yellow': [{r:14, c:8}, {r:13, c:8}, {r:12, c:8}, {r:11, c:8}, {r:10, c:8}],
            'blue': [{r:8, c:14}, {r:8, c:13}, {r:8, c:12}, {r:8, c:11}, {r:8, c:10}]
        };

        Object.keys(HOME_STRETCH).forEach(color => {
            HOME_STRETCH[color].forEach((p, i) => {
                const cell = document.createElement('div');
                cell.className = `c path-color ${color}`; cell.id = `stretch-${color}-${i}`;
                cell.style.gridRow = p.r; cell.style.gridColumn = p.c;
                board.appendChild(cell);
            });
        });

        for (let r=1; r<=15; r++) {
            for (let c=1; c<=15; c++) {
                const isHome = (r<=6 && c<=6) || (r<=6 && c>=10) || (r>=10 && c<=6) || (r>=10 && c>=10);
                const isCenter = (r>=7 && r<=9 && c>=7 && c<=9);
                if (!isHome && !isCenter) {
                    const exists = document.querySelector(`.c[style*="grid-row: ${r}"][style*="grid-column: ${c}"]`);
                    if (!exists) {
                        const cell = document.createElement('div');
                        cell.className = 'c'; cell.style.gridRow = r; cell.style.gridColumn = c;
                        board.appendChild(cell);
                    }
                }
            }
        }
    }

    document.getElementById('btn-new-game').onclick = () => {
        document.getElementById('main-menu').classList.add('hidden');
        document.getElementById('player-select').classList.remove('hidden');
    };

    window.showMainMenu = () => {
        document.getElementById('main-menu').classList.remove('hidden');
        document.getElementById('player-select').classList.add('hidden');
    };

    document.getElementById('btn-continue').onclick = () => {
        document.getElementById('menu-overlay').classList.add('hidden');
        updateUI();
    };

    const checkContinue = async () => {
        const state = await client.query("game:getGameState");
        if (state && state.status === "playing") document.getElementById('btn-continue').classList.remove('hidden');
    };

    generateBoard();
    updateUI();
    setInterval(updateUI, 500);
    checkContinue();
</script>

</body>
</html>
