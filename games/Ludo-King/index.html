<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ludo Board with Dice</title>
    <style>
        :root {
            --red: #ff0000;
            --green: #00a000;
            --yellow: #ffff00;
            --blue: #0099ff;
            --white: #ffffff;
            --border: #333;
            --cell-size: 40px;
        }

        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #e0e0e0;
            gap: 20px;
            padding: 20px;
        }

        .ludo-board {
            display: grid;
            grid-template-columns: repeat(15, var(--cell-size));
            grid-template-rows: repeat(15, var(--cell-size));
            background-color: var(--white);
            border: 2px solid var(--border);
            box-shadow: 0 0 50px rgba(0,0,0,0.3);
        }

        .c {
            border: 0.5px solid #aaa;
            box-sizing: border-box;
        }

        /* Home Bases */
        .home {
            grid-column: span 6;
            grid-row: span 6;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }
        .home-inner {
            background: white;
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 15px;
            padding: 15px;
            box-sizing: border-box;
            border: 1px solid rgba(0,0,0,0.1);
        }
        .slot { border: 1px solid rgba(0,0,0,0.1); }

        .r-h { grid-area: 1 / 1 / 7 / 7; background: var(--red); }
        .r-h .slot { background: var(--red); }
        .g-h { grid-area: 1 / 10 / 7 / 16; background: var(--green); }
        .g-h .slot { background: var(--green); }
        .y-h { grid-area: 10 / 1 / 16 / 7; background: var(--yellow); }
        .y-h .slot { background: var(--yellow); }
        .b-h { grid-area: 10 / 10 / 16 / 16; background: var(--blue); }
        .b-h .slot { background: var(--blue); }

        /* Paths */
        .red { background-color: var(--red); }
        .green { background-color: var(--green); }
        .yellow { background-color: var(--yellow); }
        .blue { background-color: var(--blue); }

        /* Center */
        .center {
            grid-area: 7 / 7 / 10 / 10;
            position: relative;
            background: white;
            border: 1px solid var(--border);
            overflow: hidden;
        }
        .tri {
            position: absolute;
            width: 100%;
            height: 100%;
        }
        .t-r { background: var(--red); clip-path: polygon(0 0, 50% 50%, 0 100%); }
        .t-g { background: var(--green); clip-path: polygon(0 0, 100% 0, 50% 50%); }
        .t-y { background: var(--yellow); clip-path: polygon(0 100%, 50% 50%, 100% 100%); }
        .t-b { background: var(--blue); clip-path: polygon(100% 0, 100% 100%, 50% 50%); }

        /* Dice Styles (Bottom) */
        #dice-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        #dice {
            width: 60px; height: 60px;
            background: white;
            border: 3px solid #333;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 32px;
            font-weight: bold;
        }
        #roll-btn {
            padding: 10px 25px;
            cursor: pointer;
            background: #333;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            transition: transform 0.1s;
        }
        #roll-btn:active { transform: scale(0.95); }
        #roll-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="ludo-board">
    <!-- Home Bases -->
    <div class="home r-h"><div class="home-inner"><div class="slot"></div><div class="slot"></div><div class="slot"></div><div class="slot"></div></div></div>
    <div class="home g-h"><div class="home-inner"><div class="slot"></div><div class="slot"></div><div class="slot"></div><div class="slot"></div></div></div>
    <div class="home y-h"><div class="home-inner"><div class="slot"></div><div class="slot"></div><div class="slot"></div><div class="slot"></div></div></div>
    <div class="home b-h"><div class="home-inner"><div class="slot"></div><div class="slot"></div><div class="slot"></div><div class="slot"></div></div></div>

    <!-- Center -->
    <div class="center">
        <div class="tri t-r"></div>
        <div class="tri t-g"></div>
        <div class="tri t-y"></div>
        <div class="tri t-b"></div>
    </div>

    <!-- Top Arm (Green Path) -->
    <div class="c" style="grid-area: 1/7"></div><div class="c" style="grid-area: 1/8"></div><div class="c" style="grid-area: 1/9"></div>
    <div class="c" style="grid-area: 2/7"></div><div class="c green" style="grid-area: 2/8"></div><div class="c green" style="grid-area: 2/9"></div>
    <div class="c" style="grid-area: 3/7"></div><div class="c green" style="grid-area: 3/8"></div><div class="c" style="grid-area: 3/9"></div>
    <div class="c" style="grid-area: 4/7"></div><div class="c green" style="grid-area: 4/8"></div><div class="c" style="grid-area: 4/9"></div>
    <div class="c" style="grid-area: 5/7"></div><div class="c green" style="grid-area: 5/8"></div><div class="c" style="grid-area: 5/9"></div>
    <div class="c" style="grid-area: 6/7"></div><div class="c green" style="grid-area: 6/8"></div><div class="c" style="grid-area: 6/9"></div>

    <!-- Bottom Arm (Yellow Path) -->
    <div class="c" style="grid-area: 10/7"></div><div class="c yellow" style="grid-area: 10/8"></div><div class="c" style="grid-area: 10/9"></div>
    <div class="c" style="grid-area: 11/7"></div><div class="c yellow" style="grid-area: 11/8"></div><div class="c" style="grid-area: 11/9"></div>
    <div class="c" style="grid-area: 12/7"></div><div class="c yellow" style="grid-area: 12/8"></div><div class="c" style="grid-area: 12/9"></div>
    <div class="c" style="grid-area: 13/7"></div><div class="c yellow" style="grid-area: 13/8"></div><div class="c" style="grid-area: 13/9"></div>
    <div class="c yellow" style="grid-area: 14/7"></div><div class="c yellow" style="grid-area: 14/8"></div><div class="c" style="grid-area: 14/9"></div>
    <div class="c" style="grid-area: 15/7"></div><div class="c" style="grid-area: 15/8"></div><div class="c" style="grid-area: 15/9"></div>

    <!-- Left Arm (Red Path) -->
    <div class="c" style="grid-area: 7/1"></div><div class="c red" style="grid-area: 7/2"></div><div class="c" style="grid-area: 7/3"></div><div class="c" style="grid-area: 7/4"></div><div class="c" style="grid-area: 7/5"></div><div class="c" style="grid-area: 7/6"></div>
    <div class="c" style="grid-area: 8/1"></div><div class="c red" style="grid-area: 8/2"></div><div class="c red" style="grid-area: 8/3"></div><div class="c red" style="grid-area: 8/4"></div><div class="c red" style="grid-area: 8/5"></div><div class="c red" style="grid-area: 8/6"></div>
    <div class="c" style="grid-area: 9/1"></div><div class="c" style="grid-area: 9/2"></div><div class="c" style="grid-area: 9/3"></div><div class="c" style="grid-area: 9/4"></div><div class="c" style="grid-area: 9/5"></div><div class="c" style="grid-area: 9/6"></div>

    <!-- Right Arm (Blue Path) -->
    <div class="c" style="grid-area: 7/10"></div><div class="c" style="grid-area: 7/11"></div><div class="c" style="grid-area: 7/12"></div><div class="c" style="grid-area: 7/13"></div><div class="c" style="grid-area: 7/14"></div><div class="c" style="grid-area: 7/15"></div>
    <div class="c blue" style="grid-area: 8/10"></div><div class="c blue" style="grid-area: 8/11"></div><div class="c blue" style="grid-area: 8/12"></div><div class="c blue" style="grid-area: 8/13"></div><div class="c blue" style="grid-area: 8/14"></div><div class="c" style="grid-area: 8/15"></div>
    <div class="c" style="grid-area: 9/10"></div><div class="c" style="grid-area: 9/11"></div><div class="c" style="grid-area: 9/12"></div><div class="c" style="grid-area: 9/13"></div><div class="c blue" style="grid-area: 9/14"></div><div class="c" style="grid-area: 9/15"></div>
</div>

<!-- Dice Container (Now at bottom) -->
<div id="dice-container">
    <div id="dice">1</div>
    <button id="roll-btn">ROLL DICE</button>
</div>

<script type="module">
    import { ConvexHttpClient } from "https://esm.sh/convex@1.16.0/browser";

    const client = new ConvexHttpClient("https://silent-scorpion-207.convex.cloud");

    const diceEl = document.getElementById('dice');
    const rollBtn = document.getElementById('roll-btn');

    async function updateUI() {
        try {
            const state = await client.query("game:getGameState");
            if (state) {
                diceEl.innerText = state.diceValue;
            }
        } catch (e) {
            console.error("Convex error:", e);
        }
    }

    rollBtn.onclick = async () => {
        rollBtn.disabled = true;
        diceEl.style.opacity = "0.5";

        try {
            await client.mutation("game:rollDice", { player: "Player 1" });
            await updateUI();
        } catch (e) {
            alert("Error rolling dice. Make sure 'npx convex dev' is running!");
        } finally {
            rollBtn.disabled = false;
            diceEl.style.opacity = "1";
        }
    };

    updateUI();
    setInterval(updateUI, 2000);
</script>

</body>
</html>
