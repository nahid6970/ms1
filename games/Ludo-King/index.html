<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ludo Master</title>
    <style>
        :root {
            --red: #ff0000; --green: #00a000; --yellow: #ffff00; --blue: #0099ff;
            --white: #ffffff; --border: #333; --cell-size: 40px;
        }

        body {
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; background-color: #2c3e50; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white; gap: 20px;
        }

        /* Menu Overlay */
        #menu-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: flex; justify-content: center; align-items: center;
            z-index: 100; flex-direction: column; gap: 20px;
        }

        .menu-card {
            background: white; padding: 40px; border-radius: 20px; color: #333;
            text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); min-width: 300px;
        }

        .menu-btn {
            display: block; width: 100%; padding: 15px; margin: 10px 0;
            border: none; border-radius: 10px; font-size: 18px; font-weight: bold;
            cursor: pointer; transition: transform 0.2s, background 0.2s;
        }

        .btn-primary { background: #3498db; color: white; }
        .btn-success { background: #2ecc71; color: white; }
        .btn-player { background: #f1c40f; color: #333; margin: 5px; width: 60px; display: inline-block; }
        .menu-btn:hover { transform: scale(1.05); }

        /* Game Board */
        .ludo-board {
            display: grid; grid-template-columns: repeat(15, var(--cell-size));
            grid-template-rows: repeat(15, var(--cell-size));
            background-color: var(--white); border: 2px solid var(--border);
            box-shadow: 0 0 50px rgba(0,0,0,0.3); position: relative;
        }

        .c { border: 0.5px solid #aaa; box-sizing: border-box; position: relative; }
        .home { grid-column: span 6; grid-row: span 6; display: flex; justify-content: center; align-items: center; padding: 30px; }
        .home-inner {
            background: white; width: 100%; height: 100%; display: grid;
            grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr;
            gap: 15px; padding: 15px; box-sizing: border-box; border: 1px solid rgba(0,0,0,0.1);
        }
        .slot { border: 1px solid rgba(0,0,0,0.1); position: relative; }

        /* Color Areas */
        .r-h { grid-area: 1 / 1 / 7 / 7; background: var(--red); }
        .g-h { grid-area: 1 / 10 / 7 / 16; background: var(--green); }
        .y-h { grid-area: 10 / 1 / 16 / 7; background: var(--yellow); }
        .b-h { grid-area: 10 / 10 / 16 / 16; background: var(--blue); }
        .red { background-color: var(--red); }
        .green { background-color: var(--green); }
        .yellow { background-color: var(--yellow); }
        .blue { background-color: var(--blue); }

        .center {
            grid-area: 7 / 7 / 10 / 10; position: relative; background: white;
            border: 1px solid var(--border); overflow: hidden;
        }
        .tri { position: absolute; width: 100%; height: 100%; }
        .t-r { background: var(--red); clip-path: polygon(0 0, 50% 50%, 0 100%); }
        .t-g { background: var(--green); clip-path: polygon(0 0, 100% 0, 50% 50%); }
        .t-y { background: var(--yellow); clip-path: polygon(0 100%, 50% 50%, 100% 100%); }
        .t-b { background: var(--blue); clip-path: polygon(100% 0, 100% 100%, 50% 50%); }

        /* Tokens */
        .token {
            width: 30px; height: 30px; border-radius: 50%; border: 3px solid white;
            box-shadow: 0 4px 8px rgba(0,0,0,0.4); position: absolute;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 50; cursor: pointer; transition: all 0.3s;
        }

        /* Dice Control */
        #dice-container {
            display: flex; flex-direction: column; align-items: center; gap: 10px;
            background: rgba(255,255,255,0.1); padding: 15px; border-radius: 15px; min-width: 200px;
        }
        #dice {
            width: 70px; height: 70px; background: white; border: 4px solid #333;
            border-radius: 15px; display: flex; justify-content: center; align-items: center;
            font-size: 40px; font-weight: bold; color: #333; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        #roll-btn {
            padding: 12px 30px; background: #e74c3c; color: white; border: none;
            border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px;
        }
        #roll-btn:disabled { background: #95a5a6; cursor: not-allowed; opacity: 0.6; }
        
        #skip-btn { padding: 8px 15px; background: #34495e; color: white; border: none; border-radius: 6px; cursor: pointer; }
        
        .hidden { display: none !important; }
        .pulse { animation: pulse 1s infinite alternate; }
        @keyframes pulse {
            from { transform: translate(-50%, -50%) scale(1); box-shadow: 0 0 5px white; }
            to { transform: translate(-50%, -50%) scale(1.1); box-shadow: 0 0 15px white; }
        }
    </style>
</head>
<body>

<div id="menu-overlay">
    <div id="main-menu" class="menu-card">
        <h2>Ludo Master</h2>
        <button id="btn-continue" class="menu-btn btn-primary hidden">CONTINUE GAME</button>
        <button id="btn-new-game" class="menu-btn btn-success">NEW GAME</button>
    </div>
    <div id="player-select" class="menu-card hidden">
        <h2>Select Players</h2>
        <div>
            <button class="menu-btn btn-player" onclick="startGame(2)">2</button>
            <button class="menu-btn btn-player" onclick="startGame(3)">3</button>
            <button class="menu-btn btn-player" onclick="startGame(4)">4</button>
        </div>
        <button onclick="showMainMenu()" class="menu-btn">Back</button>
    </div>
</div>

<div class="ludo-board" id="board">
    <div class="home r-h"><div class="home-inner"><div class="slot" id="r-0"></div><div class="slot" id="r-1"></div><div class="slot" id="r-2"></div><div class="slot" id="r-3"></div></div></div>
    <div class="home g-h"><div class="home-inner"><div class="slot" id="g-0"></div><div class="slot" id="g-1"></div><div class="slot" id="g-2"></div><div class="slot" id="g-3"></div></div></div>
    <div class="home y-h"><div class="home-inner"><div class="slot" id="y-0"></div><div class="slot" id="y-1"></div><div class="slot" id="y-2"></div><div class="slot" id="y-3"></div></div></div>
    <div class="home b-h"><div class="home-inner"><div class="slot" id="b-0"></div><div class="slot" id="b-1"></div><div class="slot" id="b-2"></div><div class="slot" id="b-3"></div></div></div>
    <div class="center"><div class="tri t-r"></div><div class="tri t-g"></div><div class="tri t-y"></div><div class="tri t-b"></div></div>
</div>

<div id="dice-container">
    <div id="player-turn-indicator" style="font-size: 20px; font-weight: bold;">Turn: Green</div>
    <div id="dice">1</div>
    <div style="display: flex; gap: 10px;">
        <button id="roll-btn">ROLL DICE</button>
        <button id="skip-btn" class="hidden">SKIP</button>
    </div>
</div>

<script type="module">
    import { ConvexHttpClient } from "https://esm.sh/convex@1.16.0/browser";
    const client = new ConvexHttpClient("https://silent-scorpion-207.convex.cloud");

    const overlay = document.getElementById('menu-overlay');
    const mainMenu = document.getElementById('main-menu');
    const playerSelect = document.getElementById('player-select');
    const btnContinue = document.getElementById('btn-continue');
    const diceEl = document.getElementById('dice');
    const rollBtn = document.getElementById('roll-btn');
    const skipBtn = document.getElementById('skip-btn');
    const turnIndicator = document.getElementById('player-turn-indicator');
    const board = document.getElementById('board');

    const colors = ['Red', 'Green', 'Yellow', 'Blue'];
    let currentPlayerIndex = 0;

    // Helper: Map pos 0-51 to Board Coordinates
    function getPathCell(idx) {
        // This is a simplified path coordinate system for the 15x15 grid
        const cells = document.querySelectorAll('.path-cell');
        return cells[idx % cells.length];
    }

    async function init() {
        generatePath();
        const state = await client.query("game:getGameState");
        if (state && state.status === "playing") btnContinue.classList.remove('hidden');
    }

    window.startGame = async (num) => {
        await client.mutation("game:startNewGame", { numPlayers: num });
        overlay.classList.add('hidden');
        updateUI();
    };

    btnContinue.onclick = () => { overlay.classList.add('hidden'); updateUI(); };

    async function updateUI() {
        const state = await client.query("game:getGameState");
        if (!state) return;

        diceEl.innerText = state.diceValue;
        currentPlayerIndex = state.currentPlayer;
        const activeColorName = colors[currentPlayerIndex];
        
        turnIndicator.innerText = `Turn: ${activeColorName}`;
        turnIndicator.style.color = `var(--${activeColorName.toLowerCase()})`;
        diceEl.style.backgroundColor = `var(--${activeColorName.toLowerCase()})`;
        diceEl.style.color = activeColorName === 'Yellow' ? '#333' : 'white';
        
        rollBtn.disabled = !state.waitingForRoll;
        if (!state.waitingForRoll) skipBtn.classList.remove('hidden');
        else skipBtn.classList.add('hidden');

        document.querySelectorAll('.token').forEach(el => el.remove());

        state.tokens.forEach((t, i) => {
            const playerIdx = Math.floor(i / 4);
            const slotIdx = i % 4;
            const tokenColor = t.player;
            
            let parent;
            if (t.pos === -1) {
                parent = document.getElementById(`${tokenColor[0]}-${slotIdx}`);
            } else {
                // Find path cell by id "p-{pos}"
                // For simplicity now, we just map to the path-cell sequence
                const pathCells = document.querySelectorAll('.path-cell');
                // Offset per player: Red: 0, Green: 13, Yellow: 26, Blue: 39
                const offset = playerIdx * 13;
                const actualPos = (t.pos + offset) % 52;
                parent = pathCells[actualPos];
            }

            if (parent) {
                const token = document.createElement('div');
                token.className = `token ${tokenColor}`;
                token.style.background = `var(--${tokenColor})`;
                
                // If it's this token's turn and dice is rolled
                if (!state.waitingForRoll && playerIdx === state.currentPlayer) {
                    // Check if 6 or already out
                    if (state.diceValue === 6 || t.pos !== -1) {
                        token.classList.add('pulse');
                        token.onclick = async (e) => {
                            e.stopPropagation();
                            await client.mutation("game:moveToken", { tokenIndex: i });
                            updateUI();
                        };
                    }
                }
                parent.appendChild(token);
            }
        });
    }

    rollBtn.onclick = async () => {
        await client.mutation("game:rollDice", { playerIndex: currentPlayerIndex });
        updateUI();
    };

    skipBtn.onclick = async () => {
        await client.mutation("game:skipTurn");
        updateUI();
    };

    function generatePath() {
        // Red start: 7,2. Path goes clockwise.
        // We add IDs to the path cells to find them easily.
        for (let r = 1; r <= 15; r++) {
            for (let c = 1; c <= 15; c++) {
                const isHome = (r <= 6 && c <= 6) || (r <= 6 && c >= 10) || (r >= 10 && c <= 6) || (r >= 10 && c >= 10);
                const isCenter = (r >= 7 && r <= 9 && c >= 7 && c <= 9);
                if (!isHome && !isCenter) {
                    const cell = document.createElement('div');
                    cell.className = 'c path-cell';
                    cell.style.gridRow = r; cell.style.gridColumn = c;
                    
                    if (r === 8 && c >= 2 && c <= 6) cell.classList.add('red');
                    if (r === 7 && c === 2) cell.classList.add('red');
                    if (c === 8 && r >= 2 && r <= 6) cell.classList.add('green');
                    if (r === 2 && c === 9) cell.classList.add('green');
                    if (r === 8 && c >= 10 && c <= 14) cell.classList.add('blue');
                    if (r === 9 && c === 14) cell.classList.add('blue');
                    if (c === 8 && r >= 10 && r <= 14) cell.classList.add('yellow');
                    if (r === 14 && c === 7) cell.classList.add('yellow');

                    board.appendChild(cell);
                }
            }
        }
    }

    init();
    setInterval(updateUI, 2000);
</script>

</body>
</html>
