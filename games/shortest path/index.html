<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graph Pathfinder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="controls">
        <button id="addNode">Add Node</button>
        <button id="connectMode">Connect Nodes</button>
        <button id="setStart">Set Start (A)</button>
        <button id="setEnd">Set End (B)</button>
        <button id="findPath">Find Shortest Path</button>
        <button id="clear">Clear Path</button>
        <button id="reset">Reset All</button>
        <button id="save">Save</button>
        <button id="load">Load</button>
    </div>
    <canvas id="canvas"></canvas>
    <script src="script.js"></script>
</body>
</html>
