<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 350px; font-family: sans-serif; padding: 15px; }
    h2 { font-size: 16px; margin-top: 0; }
    #status { font-size: 12px; color: #666; margin-bottom: 10px; }
    #content { 
      width: 100%; 
      height: 250px; 
      font-size: 12px; 
      margin-bottom: 10px; 
      white-space: pre-wrap;
      overflow-y: auto;
      border: 1px solid #ccc;
      padding: 5px;
      background: #f9f9f9;
    }
    .btn-row { display: flex; gap: 5px; }
    button { 
      flex: 1; 
      padding: 8px; 
      cursor: pointer; 
      background: #007bff; 
      color: white; 
      border: none; 
      border-radius: 4px; 
    }
    button:hover { background: #0056b3; }
    button:disabled { background: #ccc; }
  </style>
</head>
<body>
  <h2>Subtitle Interceptor</h2>
  
  <div style="margin-bottom: 10px;">
    <label for="promptSelect" style="font-size: 12px; display: block; margin-bottom: 3px;">Select Prompt:</label>
    <select id="promptSelect" style="width: 100%; padding: 5px; font-size: 12px;">
      <option value="">-- No Prompt --</option>
    </select>
  </div>

  <div id="status">Waiting for YouTube subtitles...</div>
  <div id="content">Play a YouTube video with subtitles turned on.</div>
  
  <div class="btn-row">
    <button id="copy">Copy to Clipboard</button>
    <button id="send">Send to AI Studio</button>
  </div>

  <div style="margin-top: 10px; text-align: right;">
    <a href="#" id="settingsLink" style="font-size: 12px; color: #007bff; text-decoration: none;">Manage Prompts</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
