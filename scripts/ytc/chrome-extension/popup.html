<!DOCTYPE html>
<html>
<head>
  <style>
    body { 
      width: 400px; 
      background-color: #050a0e; 
      color: #e0e0e0; 
      font-family: "Consolas", "Courier New", monospace; 
      padding: 20px; 
      margin: 0;
      border: 1px solid #333;
    }
    
    .btn-main { 
      width: 100%;
      padding: 15px; 
      cursor: pointer; 
      background: #10161d; 
      color: #00ff9f; 
      border: 2px solid #00ff9f; 
      border-radius: 4px; 
      font-weight: bold;
      font-family: inherit;
      font-size: 14px;
      transition: all 0.3s;
      text-transform: uppercase;
      margin-bottom: 20px;
      text-shadow: 0 0 5px #00ff9f;
    }
    .btn-main:hover:not(:disabled) { 
      background: #00ff9f; 
      color: #050a0e; 
      box-shadow: 0 0 20px #00ff9f;
    }
    
    #content { 
      width: 100%; 
      height: 220px; 
      font-size: 12px; 
      margin-bottom: 20px; 
      white-space: pre-wrap;
      overflow-y: auto;
      border: 1px solid #00f0ff;
      padding: 10px;
      background: #050a0e;
      color: #e0e0e0;
      border-radius: 4px;
      box-sizing: border-box;
    }
    
    .prompt-section { margin-bottom: 20px; }
    label { font-size: 11px; color: #ff003c; display: block; margin-bottom: 8px; font-weight: bold; text-transform: uppercase; }
    select { 
      width: 100%; 
      padding: 10px; 
      background-color: #10161d;
      border: 1px solid #ff003c;
      color: #e0e0e0;
      border-radius: 4px; 
      font-family: inherit;
      font-size: 13px;
      cursor: pointer;
    }
    select:focus { outline: none; border-color: #00ff9f; }
    
    .btn-row { display: flex; gap: 15px; }
    button { 
      flex: 1; 
      padding: 12px; 
      cursor: pointer; 
      background: #10161d; 
      color: #00f0ff; 
      border: 2px solid #00f0ff; 
      border-radius: 4px; 
      font-weight: bold;
      font-family: inherit;
      font-size: 13px;
      transition: all 0.3s;
      text-transform: uppercase;
    }
    button:hover:not(:disabled) { 
      background: #00f0ff; 
      color: #050a0e; 
      box-shadow: 0 0 15px #00f0ff;
    }
    button:disabled { 
      border-color: #333; 
      color: #555; 
      cursor: not-allowed; 
      text-shadow: none;
    }

    /* Custom Scrollbar */
    #content::-webkit-scrollbar { width: 6px; }
    #content::-webkit-scrollbar-track { background: #050a0e; }
    #content::-webkit-scrollbar-thumb { background: #00f0ff; border-radius: 3px; }
    #content::-webkit-scrollbar-thumb:hover { background: #00f0ff; }
  </style>
</head>
<body>
  <button id="fetchBtn" class="btn-main">[ FETCH CURRENT VIDEO SIGNAL ]</button>

  <div id="content">NO DATA DETECTED.</div>
  
  <div class="prompt-section">
    <label for="promptSelect">AI STUDIO PROMPT:</label>
    <select id="promptSelect">
      <option value="">-- NO PROMPT LOADED --</option>
    </select>
  </div>

  <div class="btn-row">
    <button id="copyBtn" disabled>[ COPY ]</button>
    <button id="sendBtn" disabled>[ INJECT TO AI ]</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
