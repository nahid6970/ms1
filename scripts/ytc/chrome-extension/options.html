<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>YTC Subtitle Hub - Settings</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="container">
    <h1>YTC INTERCEPTOR SETTINGS</h1>
    
    <div class="section">
      <label class="section-title">AI STUDIO PROMPTS:</label>
      <p style="font-size: 13px; color: #777; margin-bottom: 15px;">
        These prompts will appear in your popup dropdown for quick access when sending subtitles to AI Studio.
      </p>
      
      <div id="promptsList">
        <!-- Prompts will be added here dynamically -->
      </div>

      <div class="add-prompt-section">
        <label class="section-title" style="font-size: 12px;">Add New Prompt</label>
        <input type="text" id="newPromptName" class="text-input" placeholder="Prompt Name (e.g., Summarize)">
        <textarea id="newPromptText" class="prompt-input" style="height: 100px; margin-top: 10px;" placeholder="Instructions for AI..."></textarea>
        <button id="addPrompt" class="add-btn">+ ADD TO LIST</button>
      </div>
    </div>

    <div class="section">
      <label class="section-title">GENERAL PREFERENCES:</label>
      <div style="display: flex; align-items: center; gap: 10px;">
        <input type="checkbox" id="showViewer" style="width: 20px; height: 20px;">
        <label for="showViewer" style="font-size: 14px;">Show preview window after capture</label>
      </div>
    </div>

    <button id="save" class="save-btn">SAVE ALL SETTINGS</button>
    
    <div id="status" class="status"></div>
  </div>

  <script src="options.js"></script>
</body>
</html>
