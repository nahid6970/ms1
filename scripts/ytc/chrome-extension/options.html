<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>YTC INTERCEPTOR - SETTINGS</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="container">
    <h1>[ SYSTEM SETTINGS ]</h1>
    
    <div class="section">
      <label class="section-title">AI STUDIO PROMPTS:</label>
      <p style="font-size: 11px; color: #666; margin-bottom: 20px; font-style: italic;">
        CONFIGURE CUSTOM INSTRUCTIONS FOR AI ANALYSIS. THESE WILL BE AVAILABLE IN THE POPUP DROPDOWN.
      </p>
      
      <div id="promptsList">
        <!-- Prompts will be added here dynamically -->
      </div>

      <div class="add-prompt-section">
        <label class="section-title" style="font-size: 11px;">ADD NEW PROMPT_</label>
        <input type="text" id="newPromptName" class="text-input" placeholder="PROMPT_NAME (E.G. SUMMARIZE)">
        <textarea id="newPromptText" class="prompt-input" style="height: 120px; margin-top: 15px;" placeholder="ENTER SYSTEM INSTRUCTIONS..."></textarea>
        <div class="prompt-form-actions">
          <button id="addPrompt" class="add-btn">[ + ADD_TO_DATABASE ]</button>
          <button id="cancelEdit" class="cancel-btn" hidden>[ CANCEL_EDIT ]</button>
        </div>
      </div>
    </div>

    <div class="section">
      <label class="section-title">PREFERENCES:</label>
      <label class="checkbox-container">
        <input type="checkbox" id="showViewer">
        <span style="font-size: 14px; color: #e0e0e0;">ACTIVATE PREVIEW WINDOW AFTER SIGNAL CAPTURE</span>
      </label>
    </div>

    <button id="save" class="save-btn">[ SAVE_CONFIGURATION ]</button>
    
    <div id="status" class="status"></div>
  </div>

  <script src="options.js"></script>
</body>
</html>
