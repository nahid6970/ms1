<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content, user-scalable=no">
  <title>PowerShell Web Terminal</title>
  <link rel="icon" type="image/png" href="https://upload.wikimedia.org/wikipedia/commons/a/af/PowerShell_Core_6.0_icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0f;
      color: #e0e0e0;
      font-family: 'JetBrains Mono', 'Consolas', monospace;
      height: 100vh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background-image:
        radial-gradient(ellipse at 15% 50%, rgba(0,255,170,0.04) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 20%, rgba(0,180,255,0.04) 0%, transparent 55%);
    }

    .terminal-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 10px;
      overflow: hidden;
      gap: 10px;
      min-height: 0;
    }

    .output-wrapper {
      flex: 1;
      position: relative;
      min-height: 0;
      background: #05050a;
      border: 1px solid #00ffaa18;
      border-radius: 6px;
      padding: 8px;
      box-shadow: inset 0 0 40px rgba(0,0,0,0.6);
      overflow: hidden;
    }

    /* xterm.js fills the wrapper */
    #terminal { width: 100%; height: 100%; }
    .xterm { height: 100%; }
    .xterm-viewport { border-radius: 6px; }

    /* Match scrollbar style */
    .xterm-viewport::-webkit-scrollbar { width: 5px; }
    .xterm-viewport::-webkit-scrollbar-track { background: transparent; }
    .xterm-viewport::-webkit-scrollbar-thumb { background: #00ffaa22; border-radius: 3px; }
    .xterm-viewport::-webkit-scrollbar-thumb:hover { background: #00ffaa55; }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #0d1117;
      border: 1px solid #ffffff1a;
      border-radius: 6px;
      padding: 6px 12px;
      flex-shrink: 0;
      font-size: 12px;
      color: #444;
    }

    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #ff4466;
      flex-shrink: 0;
    }
    .status-dot.connected { background: #00ffaa; box-shadow: 0 0 6px #00ffaa88; }

    .status-bar span { margin-right: auto; }

    .btn {
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 28px; height: 28px;
      transition: all 0.15s;
      background: #0d1117;
      border: 1px solid #ffffff1a;
      color: #555;
      padding: 0;
    }
    .btn:hover { border-color: #00ffaa44; color: #00ffaa; background: #0d1a14; }
  </style>
</head>
<body>
  <div class="terminal-container">
    <div class="output-wrapper">
      <div id="terminal"></div>
    </div>
    <div class="status-bar">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text">Connecting...</span>
      <button class="btn" id="esc-btn" title="Escape">ESC</button>
      <button class="btn" id="up-btn" title="Up Arrow">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="18 15 12 9 6 15"></polyline>
        </svg>
      </button>
      <button class="btn" id="down-btn" title="Down Arrow">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 12 15 18 9"></polyline>
        </svg>
      </button>
      <button class="btn" id="reconnect-btn" title="Reconnect">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"></polyline>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
        </svg>
      </button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
  <script>
    const term = new Terminal({
      fontFamily: "'JetBrains Mono', 'Consolas', monospace",
      fontSize: 13,
      lineHeight: 1.65,
      cursorBlink: true,
      cursorStyle: 'block',
      theme: {
        background: '#05050a',
        foreground: '#e0e0e0',
        cursor: '#00ffaa',
        cursorAccent: '#000',
        black:   '#0a0a0f', brightBlack:   '#444',
        red:     '#ff4466', brightRed:     '#ff6688',
        green:   '#00ffaa', brightGreen:   '#00ffcc',
        yellow:  '#ffcc00', brightYellow:  '#ffdd44',
        blue:    '#00aaff', brightBlue:    '#44ccff',
        magenta: '#cc44ff', brightMagenta: '#dd88ff',
        cyan:    '#00ccff', brightCyan:    '#44ddff',
        white:   '#e0e0e0', brightWhite:   '#ffffff',
      },
      scrollback: 5000,
      allowTransparency: true,
    });

    const fitAddon = new FitAddon.FitAddon();
    term.loadAddon(fitAddon);
    term.open(document.getElementById('terminal'));
    fitAddon.fit();

    const dot = document.getElementById('status-dot');
    const statusText = document.getElementById('status-text');
    let ws;

    function connect() {
      ws = new WebSocket(`ws://${location.host}`);

      ws.onopen = () => {
        dot.classList.add('connected');
        statusText.textContent = 'Connected — PowerShell';
        // Send initial terminal size
        ws.send(JSON.stringify({ type: 'resize', cols: term.cols, rows: term.rows }));
      };

      ws.onmessage = (e) => {
        const { type, data } = JSON.parse(e.data);
        if (type === 'output') term.write(data);
      };

      ws.onclose = () => {
        dot.classList.remove('connected');
        statusText.textContent = 'Disconnected';
      };
    }

    // Terminal input → server
    term.onData((data) => {
      if (ws && ws.readyState === WebSocket.OPEN)
        ws.send(JSON.stringify({ type: 'input', data }));
    });

    // Resize terminal when window resizes
    const ro = new ResizeObserver(() => {
      fitAddon.fit();
      if (ws && ws.readyState === WebSocket.OPEN)
        ws.send(JSON.stringify({ type: 'resize', cols: term.cols, rows: term.rows }));
    });
    ro.observe(document.querySelector('.output-wrapper'));

    document.getElementById('reconnect-btn').addEventListener('click', () => {
      if (ws) ws.close();
      term.clear();
      connect();
    });

    document.getElementById('esc-btn').addEventListener('click', () => {
      if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: 'input', data: '\x1b' }));
      term.focus();
    });

    document.getElementById('up-btn').addEventListener('click', () => {
      if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: 'input', data: '\x1b[A' }));
      term.focus();
    });

    document.getElementById('down-btn').addEventListener('click', () => {
      if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: 'input', data: '\x1b[B' }));
      term.focus();
    });

    connect();
    term.focus();

    // Pinch to Zoom for Mobile
    let lastTouchDistance = 0;
    const terminalElement = document.getElementById('terminal');

    terminalElement.addEventListener('touchstart', (e) => {
      if (e.touches.length === 2) {
        lastTouchDistance = Math.hypot(
          e.touches[0].pageX - e.touches[1].pageX,
          e.touches[0].pageY - e.touches[1].pageY
        );
      }
    }, { passive: false });

    terminalElement.addEventListener('touchmove', (e) => {
      if (e.touches.length === 2) {
        e.preventDefault();
        const distance = Math.hypot(
          e.touches[0].pageX - e.touches[1].pageX,
          e.touches[0].pageY - e.touches[1].pageY
        );

        if (lastTouchDistance > 0) {
          const delta = distance - lastTouchDistance;
          if (Math.abs(delta) > 10) { // Threshold for smoother zooming
            let newSize = term.options.fontSize + (delta > 0 ? 1 : -1);
            newSize = Math.max(6, Math.min(40, newSize));
            
            if (newSize !== term.options.fontSize) {
              term.options.fontSize = newSize;
              fitAddon.fit();
              if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'resize', cols: term.cols, rows: term.rows }));
              }
            }
            lastTouchDistance = distance;
          }
        }
      }
    }, { passive: false });
  </script>
</body>
</html>
