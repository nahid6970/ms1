<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, minimum-scale=0.5, maximum-scale=3.0">
    <title>PowerShell Web Terminal</title>
    <link rel="icon" type="image/png" href="https://upload.wikimedia.org/wikipedia/commons/a/af/PowerShell_Core_6.0_icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a0f;
            color: #e0e0e0;
            font-family: 'JetBrains Mono', 'Consolas', monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background-image:
                radial-gradient(ellipse at 15% 50%, rgba(0,255,170,0.04) 0%, transparent 55%),
                radial-gradient(ellipse at 85% 20%, rgba(0,180,255,0.04) 0%, transparent 55%);
        }

        .header {
            background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #00ffaa22;
            box-shadow: 0 2px 20px rgba(0,255,170,0.06);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header h1 {
            font-size: 15px;
            font-weight: 700;
            color: #00ffaa;
            text-shadow: 0 0 12px rgba(0,255,170,0.5);
            letter-spacing: 1px;
        }

        .header-left > span {
            color: #444;
            font-size: 11px;
        }

        .profile-status {
            font-size: 11px;
            color: #666;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .profile-indicator {
            display: inline-block;
            width: 7px;
            height: 7px;
            border-radius: 50%;
            margin-right: 4px;
        }

        .profile-loaded { background: #00ffaa; box-shadow: 0 0 6px #00ffaa; }
        .profile-not-loaded { background: #ff4466; box-shadow: 0 0 6px #ff4466; }

        .reload-btn {
            background: transparent;
            border: 1px solid #00ffaa33;
            color: #00ffaa;
            padding: 2px 7px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            transition: all 0.2s;
        }
        .reload-btn:hover { background: rgba(0,255,170,0.1); border-color: #00ffaa88; }
        .reload-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .terminal-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 14px;
            overflow: hidden;
            gap: 10px;
        }

        .terminal-output {
            flex: 1;
            background: #05050a;
            border: 1px solid #00ffaa18;
            border-radius: 6px;
            padding: 4px 14px 14px 14px;
            overflow-y: auto;
            font-size: 13px;
            line-height: 1.65;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.6);
        }

        .terminal-input-container {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            background: #0d1117;
            border: 1px solid #ffffff1a;
            border-radius: 6px;
            padding: 8px 12px;
        }

        .prompt {
            color: #ffffff;
            font-weight: 700;

            white-space: nowrap;
        }

        .terminal-input {
            flex: 1;
            min-width: 200px;
            background: transparent;
            border: none;
            color: #e0e0e0;
            padding: 2px 4px;
            font-family: inherit;
            font-size: 13px;
            caret-color: #00ffaa;
        }
        .terminal-input:focus { outline: none; }
        .terminal-input::placeholder { color: #2a2a2a; }

        .controls-group { display: flex; gap: 5px; }

        .btn {
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 36px;
            transition: all 0.15s;
        }

        .execute-btn {
            background: linear-gradient(135deg, #00cc88, #00aa77);
            color: #000;
            font-weight: 700;
            box-shadow: 0 0 10px rgba(0,204,136,0.25);
        }
        .execute-btn:hover { box-shadow: 0 0 18px rgba(0,255,170,0.45); transform: translateY(-1px); }

        .nav-btn { background: #141920; border: 1px solid #1e2530; color: #888; font-size: 14px; }
        .nav-btn:hover { background: #1a2030; border-color: #00ffaa33; color: #ccc; }

        .delete-btn { background: #1a0810; border: 1px solid #ff446633; color: #ff4466; }
        .delete-btn:hover { background: #250a14; box-shadow: 0 0 10px rgba(255,68,102,0.25); }

        .btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none !important; box-shadow: none !important; }

        .command-line { margin-bottom: 3px; }
        .command-text { color: #00ccff; text-shadow: 0 0 6px rgba(0,204,255,0.35); }
        .output-text { color: #b8b8b8; margin-bottom: 8px; white-space: pre-wrap; }
        .error-text { color: #ff4466; margin-bottom: 8px; white-space: pre-wrap; }
        .success-text { color: #ffffff; margin-bottom: 8px; white-space: pre-wrap; }
        .loading { color: #333; font-style: italic; }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #00ffaa22; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #00ffaa55; }

        @media (max-width: 600px) {
            .header h1 { font-size: 13px; }
            .terminal-container { padding: 8px; }
            .controls-group { width: 100%; justify-content: flex-end; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <img src="https://upload.wikimedia.org/wikipedia/commons/a/af/PowerShell_Core_6.0_icon.png" alt="PowerShell Icon" style="width: 18px; height: 18px;">
            <h1>PowerShell Web Terminal</h1>
            <span>Local Session · Port 5555</span>
        </div>
        <div class="profile-status" id="profile-status">
            <span class="profile-indicator profile-not-loaded"></span>
            <span>Profile: Loading...</span>
            <button id="reload-profile-btn" class="reload-btn" title="Reload PowerShell Profile">🔄</button>
            <button id="zoom-out-btn" class="reload-btn" title="Zoom Out">－</button>
            <button id="zoom-in-btn" class="reload-btn" title="Zoom In">＋</button>        </div>
    </div>
    
    <div class="terminal-container">
        <div id="terminal-output" class="terminal-output">
            <div id="profile-info" class="output-text"></div></div>
        
        <div class="terminal-input-container">
            <span class="prompt">PS></span>
            <input type="text" id="command-input" class="terminal-input" placeholder="Enter PowerShell command..." autocomplete="off">
            <div class="controls-group">
                <button id="history-up-btn" class="btn nav-btn" title="Previous Command">↑</button>
                <button id="history-down-btn" class="btn nav-btn" title="Next Command">↓</button>
                <button id="execute-btn" class="btn execute-btn">Execute</button>
                <button id="delete-btn" class="btn delete-btn" style="display: none;">Delete</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { ConvexHttpClient } from "https://esm.sh/convex@1.16.0/browser";

        const CONVEX_URL = "https://academic-swan-974.convex.cloud"; 
        const convex = new ConvexHttpClient(CONVEX_URL);

        const outputDiv = document.getElementById('terminal-output');
        const commandInput = document.getElementById('command-input');
        const executeBtn = document.getElementById('execute-btn');
        const deleteBtn = document.getElementById('delete-btn');
        const profileStatus = document.getElementById('profile-status');
        const profileInfo = document.getElementById('profile-info');
        const reloadProfileBtn = document.getElementById('reload-profile-btn');
        const historyUpBtn = document.getElementById('history-up-btn');
        const historyDownBtn = document.getElementById('history-down-btn');
        
        let commandHistory = [];
        let searchHistory = [];
        let historyIndex = -1;
        
        async function loadProfileStatus() {
            try {
                const response = await fetch('/profile-status');
                const status = await response.json();
                updateProfileDisplay(status);
            } catch (error) {
                const indicator = profileStatus.querySelector('.profile-indicator');
                const text = profileStatus.querySelector('span:last-child');
                indicator.className = 'profile-indicator profile-not-loaded';
                text.textContent = 'Profile: Error';
            }
        }
        
        function updateProfileDisplay(status) {
            const indicator = profileStatus.querySelector('.profile-indicator');
            const text = profileStatus.querySelector('span:nth-child(2)');
            
            if (status.profile_loaded) {
                indicator.className = 'profile-indicator profile-loaded';
                text.textContent = 'Profile: Loaded';
                profileInfo.innerHTML = `✓ PowerShell profile loaded successfully<br>📁 ${status.profile_path}`;
                profileInfo.className = 'success-text';
            } else if (status.profile_exists && status.profile_error) {
                indicator.className = 'profile-indicator profile-not-loaded';
                text.textContent = 'Profile: Error';
                profileInfo.innerHTML = `✗ PowerShell profile has syntax errors:<br>📁 ${status.profile_path}<br>🔴 ${status.profile_error}<br><br>💡 Fix the syntax error and click the reload button (🔄) to try again.`;
                profileInfo.className = 'error-text';
            } else if (status.profile_exists) {
                indicator.className = 'profile-indicator profile-not-loaded';
                text.textContent = 'Profile: Error';
                profileInfo.innerHTML = `⚠ PowerShell profile found but failed to load<br>📁 ${status.profile_path}`;
                profileInfo.className = 'error-text';
            } else {
                indicator.className = 'profile-indicator profile-not-loaded';
                text.textContent = 'Profile: Not Found';
                profileInfo.innerHTML = `ℹ No PowerShell profile found<br>📁 Expected at: ${status.profile_path}`;
                profileInfo.className = 'output-text';
            }
        }
        
        async function reloadProfile() {
            reloadProfileBtn.disabled = true;
            reloadProfileBtn.textContent = '⏳';
            try {
                const response = await fetch('/reload-profile', { method: 'POST' });
                const status = await response.json();
                updateProfileDisplay(status);
                if (status.profile_loaded) {
                    addToOutput('✓ PowerShell profile reloaded successfully', 'success-text');
                } else if (status.profile_error) {
                    addToOutput(`✗ Failed to reload profile: ${status.profile_error}`, 'error-text');
                } else {
                    addToOutput('⚠ Profile reload attempted but still not loaded', 'error-text');
                }
            } catch (error) {
                addToOutput(`Error reloading profile: ${error.message}`, 'error-text');
            } finally {
                reloadProfileBtn.disabled = false;
                reloadProfileBtn.textContent = '🔄';
            }
        }
        
        async function loadHistory() {
            try {
                const result = await convex.query("functions:list");
                commandHistory = result.map(item => item.command) || [];
            } catch (error) {
                console.error('Error loading history from Convex:', error);
            }
        }
        
        function addToOutput(content, className = 'output-text') {
            const div = document.createElement('div');
            div.className = className;
            div.innerHTML = content;
            outputDiv.appendChild(div);
            outputDiv.scrollTop = outputDiv.scrollHeight;
        }
        
        function addCommandToOutput(command) {
            const div = document.createElement('div');
            div.className = 'command-line';
            div.innerHTML = `<span class="prompt">PS></span> <span class="command-text">${command}</span>`;
            outputDiv.appendChild(div);
        }
        
        async function executeCommand() {
            const command = commandInput.value.trim();
            if (!command) return;

            historyIndex = -1;
            searchHistory = [];
            deleteBtn.style.display = 'none';
            addCommandToOutput(command);
            commandInput.value = '';
            executeBtn.disabled = true;
            executeBtn.textContent = 'Executing...';
            
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'loading';
            loadingDiv.textContent = 'Executing command...';
            outputDiv.appendChild(loadingDiv);
            
            try {
                const response = await fetch('/execute', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ command })
                });
                const result = await response.json();
                outputDiv.removeChild(loadingDiv);
                if (result.output) {
                    addToOutput(result.output, result.error ? 'error-text' : 'output-text');
                }
                await convex.mutation("functions:add", { command });
                await loadHistory();
            } catch (error) {
                if (loadingDiv.parentNode) outputDiv.removeChild(loadingDiv);
                addToOutput(`Error: ${error.message}`, 'error-text');
            } finally {
                executeBtn.disabled = false;
                executeBtn.textContent = 'Execute';
                commandInput.focus();
            }
        }

        async function deleteCommand() {
            const command = commandInput.value.trim();
            if (!command) return;
            try {
                const result = await convex.mutation("functions:remove", { command });
                if (result) {
                    addToOutput(`Command deleted: ${command}`, 'success-text');
                    commandInput.value = '';
                    await loadHistory();
                } else {
                    addToOutput(`Error deleting command: Command not found in Convex history`, 'error-text');
                }
            } catch (error) {
                addToOutput(`Error: ${error.message}`, 'error-text');
            }
        }

        async function navigateHistory(direction) {
            if (historyIndex === -1) {
                const term = commandInput.value.trim();
                try {
                    const result = await convex.query("functions:search", { term });
                    searchHistory = result.map(item => item.command) || [];
                } catch (error) {
                    searchHistory = [];
                }
            }
            if (direction === 'up') {
                if (searchHistory.length > 0 && historyIndex < searchHistory.length - 1) {
                    historyIndex++;
                    commandInput.value = searchHistory[historyIndex];
                    deleteBtn.style.display = 'inline-block';
                }
            } else if (direction === 'down') {
                if (historyIndex > 0) {
                    historyIndex--;
                    commandInput.value = searchHistory[historyIndex];
                    deleteBtn.style.display = 'inline-block';
                } else if (historyIndex === 0) {
                    historyIndex = -1;
                    commandInput.value = '';
                    deleteBtn.style.display = 'none';
                }
            }
        }

        executeBtn.addEventListener('click', executeCommand);
        deleteBtn.addEventListener('click', deleteCommand);
        reloadProfileBtn.addEventListener('click', reloadProfile);
        historyUpBtn.addEventListener('click', () => navigateHistory('up'));
        historyDownBtn.addEventListener('click', () => navigateHistory('down'));
        
        commandInput.addEventListener('input', () => {
            historyIndex = -1;
            searchHistory = [];
            deleteBtn.style.display = 'none';
        });

        commandInput.addEventListener('keydown', async (event) => {
            if (event.key === 'Enter') {
                executeCommand();
            } else if (event.key === 'ArrowUp') {
                event.preventDefault();
                navigateHistory('up');
            } else if (event.key === 'ArrowDown') {
                event.preventDefault();
                navigateHistory('down');
            } else if (event.ctrlKey && event.key === 'l') {
                event.preventDefault();
                outputDiv.innerHTML = `
                    <div class="output-text">Terminal cleared</div>
        
                `;
            }
        });
        
        loadHistory().then(loadProfileStatus).then(() => commandInput.focus());

        // Zoom controls
        let fontSize = 13;
        const termOutput = document.getElementById('terminal-output');
        document.getElementById('zoom-in-btn').addEventListener('click', () => {
            fontSize = Math.min(fontSize + 1, 22);
            termOutput.style.fontSize = fontSize + 'px';
            commandInput.style.fontSize = fontSize + 'px';
        });
        document.getElementById('zoom-out-btn').addEventListener('click', () => {
            fontSize = Math.max(fontSize - 1, 5);
            termOutput.style.fontSize = fontSize + 'px';
            commandInput.style.fontSize = fontSize + 'px';
        });    </script>
</body>
</html>
