<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, minimum-scale=0.5, maximum-scale=3.0">
    <title>PowerShell Web Terminal</title>
    <link rel="icon" type="image/png" href="https://upload.wikimedia.org/wikipedia/commons/a/af/PowerShell_Core_6.0_icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a0f;
            color: #e0e0e0;
            font-family: 'JetBrains Mono', 'Consolas', monospace;
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            background-image:
                radial-gradient(ellipse at 15% 50%, rgba(0,255,170,0.04) 0%, transparent 55%),
                radial-gradient(ellipse at 85% 20%, rgba(0,180,255,0.04) 0%, transparent 55%);
        }

        .terminal-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 10px;
            overflow: hidden;
            gap: 10px;
            min-height: 0;
            position: relative;
        }

        .output-wrapper {
            flex: 1;
            position: relative;
            min-height: 0;
            display: flex;
            flex-direction: column;
        }

        .terminal-output {
            flex: 1;
            background: #05050a;
            border: 1px solid #00ffaa18;
            border-radius: 6px;
            padding: 4px 14px 14px 14px;
            overflow: auto;
            font-size: 13px;
            line-height: 1.65;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.6);
            min-height: 0;
        }

        .refresh-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: #0d1117;
            border: 1px solid #ffffff1a;
            border-radius: 5px;
            color: #555;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.15s;
            z-index: 5;
            padding: 0;
        }
        .refresh-btn:hover { border-color: #00ffaa44; color: #00ffaa; background: #0d1a14; }
        .refresh-btn.spinning svg { animation: spin 0.6s linear; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .terminal-input-container {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            background: #0d1117;
            border: 1px solid #ffffff1a;
            border-radius: 6px;
            padding: 8px 12px;
            flex-shrink: 0;
            position: sticky;
            bottom: 0;
            z-index: 10;
        }

        .prompt {
            color: #ffffff;
            font-weight: 700;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .terminal-input {
            flex: 1;
            min-width: 100px;
            background: transparent;
            border: none;
            color: #e0e0e0;
            padding: 2px 4px;
            font-family: inherit;
            font-size: 13px;
            caret-color: #00ffaa;
        }
        .terminal-input:focus { outline: none; }
        .terminal-input::placeholder { color: #2a2a2a; }

        .controls-group { 
            display: flex; 
            gap: 5px; 
            margin-left: auto;
            flex-shrink: 0;
            align-items: center;
        }

        .btn {
            border: none;
            padding: 6px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 32px;
            height: 32px;
            transition: all 0.15s;
        }

        .execute-btn {
            background: linear-gradient(135deg, #00cc88, #00aa77);
            color: #000;
            font-weight: 700;
            font-size: 16px;
            box-shadow: 0 0 10px rgba(0,204,136,0.25);
        }
        .execute-btn:hover { box-shadow: 0 0 18px rgba(0,255,170,0.45); transform: translateY(-1px); }

        .nav-btn { background: #141920; border: 1px solid #1e2530; color: #888; font-size: 14px; }
        .nav-btn:hover { background: #1a2030; border-color: #00ffaa33; color: #ccc; }

        .delete-btn { background: #1a0810; border: 1px solid #ff446633; color: #ff4466; }
        .delete-btn:hover { background: #250a14; box-shadow: 0 0 10px rgba(255,68,102,0.25); }

        .btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none !important; box-shadow: none !important; }

        .command-line { margin-bottom: 3px; white-space: pre; }
        .command-text { color: #00ccff; text-shadow: 0 0 6px rgba(0,204,255,0.35); }
        .output-text { color: #b8b8b8; margin-bottom: 8px; white-space: pre; }
        .error-text { color: #ff4466; margin-bottom: 8px; white-space: pre; }
        .success-text { color: #ffffff; margin-bottom: 8px; white-space: pre; }
        .loading { color: #333; font-style: italic; }

        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #00ffaa22; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #00ffaa55; }

        @media (max-width: 600px) {
            .terminal-container { padding: 6px; gap: 6px; }
            .terminal-input-container { padding: 4px 8px; gap: 4px; }
            .controls-group { margin-left: 0; width: auto; }
            .terminal-input { min-width: 50px; font-size: 14px; }
            .btn { min-width: 30px; height: 30px; padding: 4px 8px; }
        }
    </style>
</head>
<body>
    <div class="terminal-container">
        <div class="output-wrapper">
            <div id="terminal-output" class="terminal-output"></div>
            <button class="refresh-btn" id="refresh-btn" title="Refresh page">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="23 4 23 10 17 10"></polyline>
                    <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
                </svg>
            </button>
        </div>
        
        <div class="terminal-input-container">
            <span class="prompt">PS></span>
            <input type="text" id="command-input" class="terminal-input" placeholder="Enter PowerShell command..." autocomplete="off">
            <div class="controls-group">
                <button id="history-up-btn" class="btn nav-btn" title="Previous Command">↑</button>
                <button id="history-down-btn" class="btn nav-btn" title="Next Command">↓</button>
                <button id="execute-btn" class="btn execute-btn" title="Execute">▲</button>
                <button id="delete-btn" class="btn delete-btn" style="display: none;">Delete</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { ConvexHttpClient } from "https://esm.sh/convex@1.16.0/browser";

        const CONVEX_URL = "https://academic-swan-974.convex.cloud"; 
        const convex = new ConvexHttpClient(CONVEX_URL);

        const outputDiv = document.getElementById('terminal-output');
        const commandInput = document.getElementById('command-input');
        const executeBtn = document.getElementById('execute-btn');
        const deleteBtn = document.getElementById('delete-btn');
        const historyUpBtn = document.getElementById('history-up-btn');
        const historyDownBtn = document.getElementById('history-down-btn');
        const refreshBtn = document.getElementById('refresh-btn');
        
        let commandHistory = [];
        let searchHistory = [];
        let historyIndex = -1;
        
        async function loadHistory() {
            try {
                const result = await convex.query("functions:list");
                commandHistory = result.map(item => item.command) || [];
            } catch (error) {
                console.error('Error loading history from Convex:', error);
            }
        }
        
        function addToOutput(content, className = 'output-text') {
            const div = document.createElement('div');
            div.className = className;
            div.innerHTML = content;
            outputDiv.appendChild(div);
            outputDiv.scrollTop = outputDiv.scrollHeight;
        }
        
        function addCommandToOutput(command) {
            const div = document.createElement('div');
            div.className = 'command-line';
            div.innerHTML = `<span class="prompt">PS></span> <span class="command-text">${command}</span>`;
            outputDiv.appendChild(div);
        }
        
        async function executeCommand() {
            const command = commandInput.value.trim();
            if (!command) return;

            historyIndex = -1;
            searchHistory = [];
            deleteBtn.style.display = 'none';
            addCommandToOutput(command);
            commandInput.value = '';
            executeBtn.disabled = true;
            executeBtn.textContent = '...';
            
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'loading';
            loadingDiv.textContent = 'Executing command...';
            outputDiv.appendChild(loadingDiv);
            
            try {
                const response = await fetch('/execute', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ command })
                });
                const result = await response.json();
                outputDiv.removeChild(loadingDiv);
                if (result.output) {
                    addToOutput(result.output, result.error ? 'error-text' : 'output-text');
                }
                await convex.mutation("functions:add", { command });
                await loadHistory();
            } catch (error) {
                if (loadingDiv.parentNode) outputDiv.removeChild(loadingDiv);
                addToOutput(`Error: ${error.message}`, 'error-text');
            } finally {
                executeBtn.disabled = false;
                executeBtn.textContent = '▲';
                commandInput.focus();
            }
        }

        async function deleteCommand() {
            const command = commandInput.value.trim();
            if (!command) return;
            try {
                const result = await convex.mutation("functions:remove", { command });
                if (result) {
                    addToOutput(`Command deleted: ${command}`, 'success-text');
                    commandInput.value = '';
                    await loadHistory();
                } else {
                    addToOutput(`Error deleting command: Command not found in Convex history`, 'error-text');
                }
            } catch (error) {
                addToOutput(`Error: ${error.message}`, 'error-text');
            }
        }

        async function navigateHistory(direction) {
            if (historyIndex === -1) {
                const term = commandInput.value.trim();
                try {
                    const result = await convex.query("functions:search", { term });
                    searchHistory = result.map(item => item.command) || [];
                } catch (error) {
                    searchHistory = [];
                }
            }
            if (direction === 'up') {
                if (searchHistory.length > 0 && historyIndex < searchHistory.length - 1) {
                    historyIndex++;
                    commandInput.value = searchHistory[historyIndex];
                    deleteBtn.style.display = 'inline-block';
                }
            } else if (direction === 'down') {
                if (historyIndex > 0) {
                    historyIndex--;
                    commandInput.value = searchHistory[historyIndex];
                    deleteBtn.style.display = 'inline-block';
                } else if (historyIndex === 0) {
                    historyIndex = -1;
                    commandInput.value = '';
                    deleteBtn.style.display = 'none';
                }
            }
        }

        refreshBtn.addEventListener('click', () => {
            refreshBtn.classList.add('spinning');
            setTimeout(() => location.reload(), 600);
        });

        executeBtn.addEventListener('click', executeCommand);
        deleteBtn.addEventListener('click', deleteCommand);
        historyUpBtn.addEventListener('click', () => navigateHistory('up'));
        historyDownBtn.addEventListener('click', () => navigateHistory('down'));
        
        commandInput.addEventListener('input', () => {
            historyIndex = -1;
            searchHistory = [];
            deleteBtn.style.display = 'none';
        });

        commandInput.addEventListener('keydown', async (event) => {
            if (event.key === 'Enter') {
                executeCommand();
            } else if (event.key === 'ArrowUp') {
                event.preventDefault();
                navigateHistory('up');
            } else if (event.key === 'ArrowDown') {
                event.preventDefault();
                navigateHistory('down');
            } else if (event.ctrlKey && event.key === 'l') {
                event.preventDefault();
                outputDiv.innerHTML = `<div class="output-text">Terminal cleared</div>`;
            }
        });
        
        loadHistory().then(() => commandInput.focus());

        // Scroll into view on focus for mobile
        commandInput.addEventListener('focus', () => {
            setTimeout(() => {
                commandInput.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 300);
        });
    </script>
</body>
</html>
