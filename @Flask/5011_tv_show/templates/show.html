
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ show.title }}</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="sticky-controls-wrapper">
        <div class="top-center-controls">
            <a href="{{ url_for('index') }}" class="add-button home-button" title="Home" style="background-color: white; color: black; padding: 8px 10px;">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
            </a>
            <h2 style="margin: 0; color: #1db954; font-size: 1.2rem;">{{ show.title }}</h2>
        </div>
    </div>

    <div class="show-details-container">
        <div class="show-cover">
            <img src="{{ show.cover_image }}" alt="{{ show.title }}">
            <div class="stars-container{% if show.rating %} rating-{{ show.rating | int }}{% endif %}" style="margin-top: 15px; justify-content: center;">
                {% if show.rating %}
                    {% for i in range(show.rating | int) %}
                        <svg viewBox="0 0 24 24" class="star-svg">
                            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26" />
                        </svg>
                    {% endfor %}
                {% endif %}
            </div>
            
            <form action="{{ url_for('add_episode', show_id=show.id) }}" method="post" style="display: flex; justify-content: center; align-items: center; gap: 5px; margin-top: 20px;">
                <input type="text" name="title" placeholder="New episode title" required style="flex-grow: 1; padding: 8px; background: #333; border: 1px solid #555; color: white; border-radius: 4px;">
                <button type="submit" class="form-action-button add-episode-button" style="background: #1db954; border: none; color: white; width: 38px; height: 38px; border-radius: 4px; cursor: pointer;">+</button>
            </form>
        </div>

        <div class="episode-list">
            <ul>
                {% for episode in show.episodes %}
                    <li class="episode-item{% if episode.watched %} episode-watched{% endif %}">
                        <span class="episode-title">
                            <input type="checkbox" {% if episode.watched %}checked{% endif %} onchange="window.location.href='{{ url_for('toggle_watched', show_id=show.id, episode_id=episode.id) }}'">
                            {{ episode.title }}
                        </span>
                        <span class="episode-controls">
                            <a href="#" onclick="openEditEpisodeModal({{ show.id }}, {{ episode.id }})" class="edit-dot" title="Edit Episode"></a>
                            <a href="{{ url_for('delete_episode', show_id=show.id, episode_id=episode.id) }}" class="delete-dot" title="Delete Episode" onclick="return confirm('Are you sure you want to delete this episode?')"></a>
                        </span>
                    </li>
                {% endfor %}
            </ul>
        </div>
    </div>

    <!-- Modals (kept for functionality) -->
    <div id="editEpisodeModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeEditEpisodeModal()">&times;</span>
            <h2>Edit Episode</h2>
            <form id="editEpisodeForm" action="/edit_episode" method="post">
                <input type="hidden" id="editEpisodeShowId" name="show_id">
                <input type="hidden" id="editEpisodeId" name="id">
                <label for="editEpisodeTitle">Title:</label>
                <input type="text" id="editEpisodeTitle" name="title" required>
                <button type="submit">Save Changes</button>
            </form>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
