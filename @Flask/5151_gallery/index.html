            }
          };

          const applyFontSize = (sz) => {
            restoreSelection();
            document.execCommand('fontSize', false, '7');
            const fonts = editor.querySelectorAll('font[size="7"]');
            const cr = c.getBoundingClientRect();
            const sc = (cr && cr.width > 0 && c.width > 0) ? (cr.width / c.width) : 1;
            if (fonts.length > 0) {
              fonts.forEach(f => {
                f.removeAttribute('size');
                f.style.setProperty('--canvas-font-size', sz + 'px');
                f.dataset.canvasSize = sz;
                f.style.fontSize = (sz * sc) + 'px';
              });
            } else {
              textFontSize = sz;
              editor.style.setProperty('--canvas-font-size', sz + 'px');
              editor.dataset.canvasSize = sz;
              editor.style.fontSize = (sz * sc) + 'px';
            }
            saveSelection();
            editor.focus();
          };

          const commitText = () => {
            if (committed) return;
            committed = true;
            
            const textVal = editor.innerText.trim();
            const hasText = textVal.length > 0 && textVal !== 'Type text...';
            
            if (hasText) {
              saveHistory();
              
              // Helper: recursively extract styled lines from contenteditable DOM structures
              const getLinesFromEditor = (editorElem) => {
                const lines = [];
                let currentLine = [];
                
                const defaultStyles = {
                  bold: false,
                  italic: false,
                  underline: false,
                  size: textFontSize,
                  color: activeColor
                };

                const flushLine = (forceEmpty = false) => {
                  if (currentLine.length > 0) {
                    lines.push(currentLine);
                    currentLine = [];
                  } else if (forceEmpty) {
                    lines.push([{ text: '', ...defaultStyles }]);
                  }
                };
                
                const traverse = (node, currentStyles) => {
                  if (node.nodeType === Node.TEXT_NODE) {
                    if (node.nodeValue) {
                      currentLine.push({
                        text: node.nodeValue,
                        ...currentStyles
                      });
                    }
                    return;
                  }
                  
                  if (node.nodeType === Node.ELEMENT_NODE) {
                    const tag = node.tagName.toLowerCase();
                    
                    if (tag === 'br') {
                      flushLine(true);
                      return;
                    }
                    
                    const newStyles = { ...currentStyles };
                    if (tag === 'b' || tag === 'strong') {
                      newStyles.bold = true;
                    } else if (tag === 'i' || tag === 'em') {
                      newStyles.italic = true;
                    } else if (tag === 'u') {
                      newStyles.underline = true;
                    }
                    
                    if (node.dataset && node.dataset.canvasSize) {
                      newStyles.size = parseInt(node.dataset.canvasSize) || currentStyles.size;
                    } else if (node.style.fontSize) {
                      newStyles.size = parseInt(node.style.fontSize) || currentStyles.size;
                    }
                    
                    if (node.style.color) {
                      newStyles.color = node.style.color;
                    } else if (node.hasAttribute('color')) {
                      newStyles.color = node.getAttribute('color');
                    }
                    
                    if (node.style.fontWeight === 'bold') {
                      newStyles.bold = true;
                    }
                    if (node.style.fontStyle === 'italic') {
                      newStyles.italic = true;
                    }
                    if (node.style.textDecoration.includes('underline')) {
                      newStyles.underline = true;
                    }
                    
                    const isBlock = (tag === 'div' || tag === 'p' || tag === 'li');
                    
                    if (isBlock && node !== editorElem) {
                      flushLine();
                    }
                    
                    for (let i = 0; i < node.childNodes.length; i++) {
                      traverse(node.childNodes[i], newStyles);
                    }
                    
                    if (isBlock && node !== editorElem) {
                      flushLine();
                    }
                  }
                };
                
                traverse(editorElem, defaultStyles);
                flushLine();
                
                if (lines.length === 0) {
                  lines.push([{ text: '', ...defaultStyles }]);
                }
                
                return lines;
              };
              
              const rawLines = getLinesFromEditor(editor);
              const maxWidth = editor.offsetWidth / displayScale;
              const allWrappedLines = [];
              
              const wrapChunks = (context, inlineChunks, maxW) => {
                const lines = [];
                let currentLine = [];
                let currentLineWidth = 0;
                
                for (const chunk of inlineChunks) {
                  const words = chunk.text.split(/(\s+)/);
                  for (const word of words) {
                    if (!word) continue;
                    
                    let fontStyleStr = '';
                    if (chunk.italic) fontStyleStr += 'italic ';
                    if (chunk.bold) fontStyleStr += 'bold ';
                    context.font = `${fontStyleStr}${chunk.size}px sans-serif`;
                    
                    const wordWidth = context.measureText(word).width;
                    if (currentLineWidth + wordWidth > maxW && currentLine.length > 0 && word.trim()) {
                      lines.push(currentLine);
                      currentLine = [];
                      currentLineWidth = 0;
                    }
                    currentLine.push({
                      text: word,
                      bold: chunk.bold,
                      italic: chunk.italic,
                      underline: chunk.underline,
                      size: chunk.size,
                      color: chunk.color
                    });
                    currentLineWidth += wordWidth;
                  }
                }
                if (currentLine.length > 0) {
                  lines.push(currentLine);
                }
                return lines;
              };
              
              const xCtx = x;
              xCtx.save();
              
              rawLines.forEach(lineChunks => {

                if (wrapped.length === 0) {
                  let lineSize = textFontSize;
                  if (lineChunks.length > 0) {
                    lineChunks.forEach(item => { if (item.size > lineSize) lineSize = item.size; });
                  }
                  allWrappedLines.push([{ text: '', size: lineSize }]);
                } else {
                  allWrappedLines.push(...wrapped);
                }
              });
              
              xCtx.globalCompositeOperation = 'source-over';
              xCtx.textBaseline = 'top';
              
              let currentY = py;
              allWrappedLines.forEach(line => {
                let maxFontSize = 12;
                line.forEach(item => {
                  if (item.size > maxFontSize) maxFontSize = item.size;
                });
                
                let currentX = px;
                line.forEach(item => {
                  if (!item.text) return;
                  
                  let fontStyleStr = '';
                  if (item.italic) fontStyleStr += 'italic ';
                  if (item.bold) fontStyleStr += 'bold ';
                  xCtx.font = `${fontStyleStr}${item.size}px sans-serif`;
                  xCtx.fillStyle = item.color;
                  xCtx.fillText(item.text, currentX, currentY);
                  
                  if (item.underline) {
                    const textWidth = xCtx.measureText(item.text).width;
                    xCtx.beginPath();
                    xCtx.moveTo(currentX, currentY + item.size + 1);
                    xCtx.lineTo(currentX + textWidth, currentY + item.size + 1);
                    xCtx.lineWidth = Math.max(1, item.size / 16);
                    xCtx.strokeStyle = item.color;
                    xCtx.stroke();
                  }
                  currentX += xCtx.measureText(item.text).width;
                });
                
                currentY += maxFontSize * textLineGap;
              });
              xCtx.restore();
            }
            window.activePaintTextCommit = null;
            toolbar.remove();
            editor.remove();
          };

          // Setup styles and properties of Toolbar
          toolbar.style.position = 'absolute';
          toolbar.style.left = clickX + 'px';
          toolbar.style.top = Math.max(5, clickY - 35) + 'px';
          toolbar.style.background = '#1a1a2e';
          toolbar.style.border = '1px solid #444';
          toolbar.style.borderRadius = '4px';
          toolbar.style.padding = '3px 6px';
          toolbar.style.display = 'flex';
          toolbar.style.gap = '6px';
          toolbar.style.alignItems = 'center';
          toolbar.style.zIndex = '60';
          toolbar.style.boxShadow = '0 4px 10px rgba(0,0,0,0.5)';
          toolbar.style.userSelect = 'none';

          toolbar.onmousedown = (ev) => {

          decreaseBtn.onclick = (ev) => {

          toolbar.appendChild(decreaseBtn);

          const increaseBtn = document.createElement('button');

          increaseBtn.onclick = (ev) => {
            ev.stopPropagation();
            textFontSize = Math.min(120, textFontSize + 2);
            applyFontSize(textFontSize);
          };
          toolbar.appendChild(increaseBtn);

          const gapLabel = document.createElement('span');
          gapLabel.textContent = 'Gap:';
          gapLabel.style.cssText = 'color:#ccc;font-size:10px;font-family:sans-serif;font-weight:600;margin-left:4px;';

          const decLineBtn = document.createElement('button');
          decLineBtn.textContent = 'L-';

          decLineBtn.onclick = (ev) => {

          incLineBtn.style.cssText = 'background:#333;color:#fff;border:1px solid #555;border-radius:3px;padding:2px 6px;font-size:10px;font-weight:bold;cursor:pointer;line-height:1.2;outline:none;';
          incLineBtn.onclick = (ev) => {
            ev.stopPropagation();

          boldBtn.onclick = (ev) => {

          const italicBtn = document.createElement('button');

          italicBtn.onclick = (ev) => {

          const underlineBtn = document.createElement('button');

          underlineBtn.onclick = (ev) => {
            ev.stopPropagation();
            restoreSelection();
            document.execCommand('underline', false);
            saveSelection();
            editor.focus();
          };
          toolbar.appendChild(underlineBtn);

          const resizeObserver = new ResizeObserver(entries => {
            for (let entry of entries) {
              const cr = c.getBoundingClientRect();
              if (!cr || cr.width <= 0 || c.width <= 0) continue;
              const sc = cr.width / c.width;
              if (sc > 0 && !isNaN(sc)) {
                const calculatedW = entry.contentRect.width / sc;
                if (!isNaN(calculatedW) && calculatedW > 0) {
                  canvasWidth = calculatedW;
                }
              }
            }
          });

          const cleanup = () => {
            resizeObserver.disconnect();
            window.activePaintTextCommit = null;
            window.updateActivePaintTextPosition = null;
            toolbar.remove();
            editor.remove();
          };

          const closeBtn = document.createElement('button');
          closeBtn.textContent = 'X';
          closeBtn.style.cssText = 'background:#ef4444;color:#fff;border:1px solid #7f1d1d;border-radius:3px;padding:2px 8px;font-size:10px;font-weight:bold;cursor:pointer;line-height:1.2;outline:none;margin-left:6px;';
          closeBtn.onclick = (ev) => {
            ev.stopPropagation();
            committed = true;
            cleanup();
          };
          toolbar.appendChild(closeBtn);

          let canvasWidth = 200;

          // Setup styles and properties of Editor
          editor.contentEditable = 'true';
          editor.style.position = 'absolute';
          editor.style.setProperty('--canvas-font-size', textFontSize + 'px');
          editor.dataset.canvasSize = textFontSize;
          editor.style.lineHeight = textLineGap;
          editor.style.color = activeColor;
          editor.style.fontFamily = 'sans-serif';
          editor.style.background = 'rgba(255, 255, 255, 0.08)';
          editor.style.border = '1px dashed #38bdf8';
          editor.style.outline = 'none';
          editor.style.zIndex = '50';
          editor.style.padding = '4px';
          editor.style.margin = '0';
          editor.style.overflow = 'hidden';
          editor.style.resize = 'horizontal';
          editor.style.wordBreak = 'break-word';
          editor.style.whiteSpace = 'pre-wrap';
          editor.style.width = '200px';
          editor.style.minWidth = '50px';
          editor.style.minHeight = '30px';
          editor.innerHTML = 'Type text...';

          resizeObserver.observe(editor);

          const updatePos = () => {
            const cr = c.getBoundingClientRect();
            if (!cr || cr.width <= 0 || c.width <= 0) return;
            const sc = cr.width / c.width;
            if (isNaN(sc) || sc <= 0) return;

            const sx = clickCanvasX * sc;
            const sy = clickCanvasY * sc;
            editor.style.left = sx + 'px';
            editor.style.top = sy + 'px';
            editor.style.width = (canvasWidth * sc) + 'px';
            editor.style.fontSize = (textFontSize * sc) + 'px';

            editor.querySelectorAll('font, span').forEach(el => {
              const canvasSz = el.style.getPropertyValue('--canvas-font-size') || el.dataset.canvasSize;
              if (canvasSz) {
                el.style.fontSize = (parseInt(canvasSz) * sc) + 'px';
              }
            });

            toolbar.style.left = sx + 'px';
            toolbar.style.top = Math.max(5, sy - 35) + 'px';
          };
          window.updateActivePaintTextPosition = updatePos;
          updatePos();

          editor.onfocus = () => {
            if (editor.innerHTML === 'Type text...') {
              editor.innerHTML = '';
            }
            saveSelection();
          };
          editor.onkeyup = saveSelection;
          editor.onmouseup = saveSelection;

          editor.onblur = () => {
            setTimeout(() => {
              if (document.activeElement === editor || toolbar.contains(document.activeElement)) {
                return;
              }
              commitText();
            }, 150);
          };

          editor.onkeydown = (ev) => {
            if (ev.key === 'Enter' && (ev.ctrlKey || ev.metaKey)) {
              ev.preventDefault();
              commitText();
            } else if (ev.key === 'Escape') {
              committed = true;
              cleanup();
            }
          };

          // Drag-to-Move Logic
          let isDragging = false;
          let dragStartX, dragStartY;
          let originalToolbarLeft, originalToolbarTop;
          let originalEditorLeft, originalEditorTop;
          
          const dragStart = (clientX, clientY) => {
            isDragging = true;
            dragStartX = clientX;
            dragStartY = clientY;
            originalToolbarLeft = parseFloat(toolbar.style.left) || 0;
            originalToolbarTop = parseFloat(toolbar.style.top) || 0;
            originalEditorLeft = parseFloat(editor.style.left) || 0;
            originalEditorTop = parseFloat(editor.style.top) || 0;
          };

          const dragMove = (clientX, clientY) => {
            if (!isDragging) return;
            const dx = clientX - dragStartX;
            const dy = clientY - dragStartY;
            
            toolbar.style.left = (originalToolbarLeft + dx) + 'px';
            toolbar.style.top = (originalToolbarTop + dy) + 'px';
            editor.style.left = (originalEditorLeft + dx) + 'px';
            editor.style.top = (originalEditorTop + dy) + 'px';
          };

          const dragEnd = () => {
            if (isDragging) {
              isDragging = false;
              const canvasRect = c.getBoundingClientRect();
              const scale = c.width / canvasRect.width;
              px = parseFloat(editor.style.left) * scale;
              py = parseFloat(editor.style.top) * scale;
            }
          };

          // Bind Drag on toolbar background and "Size:" label
          toolbar.onmousedown = (ev) => {
            if (ev.target.tagName === 'BUTTON' || ev.target.tagName === 'INPUT') return;
            ev.preventDefault();
            dragStart(ev.clientX, ev.clientY);
            
            const mouseMoveHandler = (e2) => dragMove(e2.clientX, e2.clientY);
            const mouseUpHandler = () => {
              dragEnd();
              document.removeEventListener('mousemove', mouseMoveHandler);
              document.removeEventListener('mouseup', mouseUpHandler);
            };
            document.addEventListener('mousemove', mouseMoveHandler);
            document.addEventListener('mouseup', mouseUpHandler);
          };

          toolbar.ontouchstart = (ev) => {
            if (ev.target.tagName === 'BUTTON' || ev.target.tagName === 'INPUT') return;
            const touch = ev.touches[0];
            dragStart(touch.clientX, touch.clientY);
            
            const touchMoveHandler = (e2) => {
              if (isDragging) {
                dragMove(e2.touches[0].clientX, e2.touches[0].clientY);
                e2.preventDefault();
              }
            };
            const touchEndHandler = () => {
              dragEnd();
              document.removeEventListener('touchmove', touchMoveHandler);
              document.removeEventListener('touchend', touchEndHandler);
            };
            document.addEventListener('touchmove', touchMoveHandler, { passive: false });
            document.addEventListener('touchend', touchEndHandler);
          };

          // Append elements to DOM and activate lock
          const container = document.getElementById('paintCanvasContainer');
          if (container) {
            container.appendChild(toolbar);
            container.appendChild(editor);
            editor.focus();
            window.activePaintTextCommit = commitText;
          }
        }
        return;
      }
      saveHistory(); _drawing = true;
      applyTool(x); x.beginPath(); x.moveTo(px, py);
    }

    function recolorTextInBox(x, sx, sy, ex, ey) {
      const xStart = Math.min(sx, ex);
      const yStart = Math.min(sy, ey);
      const boxW = Math.round(Math.abs(ex - sx));
      const boxH = Math.round(Math.abs(ey - sy));
      if (boxW <= 0 || boxH <= 0) return;
      
      const bgC = document.getElementById('paintBgCanvas');
      const bgCtx = bgC.getContext('2d');
      
      const bgData = bgCtx.getImageData(xStart, yStart, boxW, boxH);
      const pixels = bgData.data;
      
      const offC = document.createElement('canvas');
      offC.width = boxW;
      offC.height = boxH;
      const offCtx = offC.getContext('2d');
      const offData = offCtx.createImageData(boxW, boxH);
      const offPixels = offData.data;
      
      const rows = document.querySelectorAll('.recolor-rule-row');
      const rules = [];
      rows.forEach(row => {
        const enabled = row.querySelector('.rule-enabled-checkbox').checked;
        if (!enabled) return;
        
        const scan = row.querySelector('.scan-color-input').value;
        const target = row.querySelector('.target-color-input').value;
        const tolerancePct = parseInt(row.querySelector('.tolerance-input').value) || 60;
        
        const [sr, sg, sb] = hexToRgb(scan);
        const [tr, tg, tb] = hexToRgb(target);
        
        // Convert 10-100 percentage to L1 threshold (76.5 to 765)
        const threshold = tolerancePct * 7.65;
        
        rules.push({ sr, sg, sb, tr, tg, tb, threshold });
      });
      
      if (rules.length === 0) return;
      
      for (let i = 0; i < pixels.length; i += 4) {
        const r = pixels[i];
        const g = pixels[i+1];
        const b = pixels[i+2];
        const a = pixels[i+3];
        
        if (a === 0) continue;
        
        for (const rule of rules) {
          const dist = Math.abs(r - rule.sr) + Math.abs(g - rule.sg) + Math.abs(b - rule.sb);
          if (dist < rule.threshold) {
            const factor = (rule.threshold - dist) / rule.threshold;
            offPixels[i] = rule.tr;
            offPixels[i+1] = rule.tg;
            offPixels[i+2] = rule.tb;
            offPixels[i+3] = Math.round(factor * 255);
            break;
          }
        }
      }
      
      offCtx.putImageData(offData, 0, 0);
      x.drawImage(offC, xStart, yStart);
    }

    function drawShape(x, sx, sy, ex, ey, isFinal = false) {
      if (window._paintColorIsTransparent) {
        if (!isFinal) {
          x.save();
          x.strokeStyle = '#38bdf8';
          x.setLineDash([4, 4]);
          x.lineWidth = 1.5;
          x.strokeRect(sx, sy, ex - sx, ey - sy);
          x.restore();
        } else {
          if (document.getElementById('paintRecolorToggleBtn')?.dataset.checked === 'true') {
            recolorTextInBox(x, sx, sy, ex, ey);
          }
        }
        return;
      }

      const color = document.getElementById('paintColor').value;
      const lw = parseInt(document.getElementById('paintSize').value);
      x.globalCompositeOperation = 'source-over';
      x.strokeStyle = color; x.fillStyle = color; x.lineWidth = lw;
      x.lineCap = 'round'; x.lineJoin = 'round';
      const cx = sx+(ex-sx)/2, cy = sy+(ey-sy)/2;
      const rx = Math.abs(ex-sx)/2, ry = Math.abs(ey-sy)/2;
      const w = ex-sx, h = ey-sy;

      // helper: regular polygon points
      function polyPts(n, cx2, cy2, r, rot=0) {
        return Array.from({length:n}, (_,i) => {
          const a = (i*2*Math.PI/n) - Math.PI/2 + rot;
          return [cx2+r*Math.cos(a), cy2+r*Math.sin(a)];
        });
      }
      function drawPoly(pts, fill) {
        x.beginPath(); x.moveTo(pts[0][0],pts[0][1]);
        pts.slice(1).forEach(p => x.lineTo(p[0],p[1])); x.closePath();
        fill ? x.fill() : x.stroke();
      }

      x.beginPath();
      if (_shape === 'line') {
        x.moveTo(sx, sy); x.lineTo(ex, ey); x.stroke();
      } else if (_shape === 'rect') {
        x.strokeRect(sx, sy, w, h);
      } else if (_shape === 'rectFill') {
        x.fillRect(sx, sy, w, h);
        if (isFinal && document.getElementById('paintRecolorToggleBtn')?.dataset.checked === 'true') {
          recolorTextInBox(x, sx, sy, ex, ey);
        }
      } else if (_shape === 'highlighter') {
        x.save();
        x.globalAlpha = 0.45;
        x.fillRect(sx, sy, w, h);
        x.restore();
        if (isFinal && document.getElementById('paintRecolorToggleBtn')?.dataset.checked === 'true') {
          recolorTextInBox(x, sx, sy, ex, ey);
        }
      } else if (_shape === 'rectRound') {
        const r = Math.min(Math.abs(w),Math.abs(h))*0.15;
        x.roundRect(sx, sy, w, h, r); x.stroke();
      } else if (_shape === 'rectRoundFill') {
        const r = Math.min(Math.abs(w),Math.abs(h))*0.15;
        x.roundRect(sx, sy, w, h, r); x.fill();
      } else if (_shape === 'circle') {
        x.ellipse(cx, cy, rx, ry, 0, 0, Math.PI*2); x.stroke();
      } else if (_shape === 'circleFill') {
        x.ellipse(cx, cy, rx, ry, 0, 0, Math.PI*2); x.fill();
      } else if (_shape === 'ring') {
        x.ellipse(cx, cy, rx, ry, 0, 0, Math.PI*2); x.stroke();
        x.beginPath(); x.ellipse(cx, cy, rx*0.5, ry*0.5, 0, 0, Math.PI*2); x.stroke();
      } else if (_shape === 'triangle') {
        x.moveTo(cx, sy); x.lineTo(ex, ey); x.lineTo(sx, ey); x.closePath(); x.stroke();
      } else if (_shape === 'triangleFill') {
        x.moveTo(cx, sy); x.lineTo(ex, ey); x.lineTo(sx, ey); x.closePath(); x.fill();
      } else if (_shape === 'rightTri') {
        x.moveTo(sx, sy); x.lineTo(sx, ey); x.lineTo(ex, ey); x.closePath(); x.stroke();
      } else if (_shape === 'diamond') {
        x.moveTo(cx,sy); x.lineTo(ex,cy); x.lineTo(cx,ey); x.lineTo(sx,cy); x.closePath(); x.stroke();
      } else if (_shape === 'diamondFill') {
        x.moveTo(cx,sy); x.lineTo(ex,cy); x.lineTo(cx,ey); x.lineTo(sx,cy); x.closePath(); x.fill();
      } else if (_shape === 'pentagon') {
        drawPoly(polyPts(5, cx, cy, Math.min(rx,ry)), false);
      } else if (_shape === 'hexagon') {
        drawPoly(polyPts(6, cx, cy, Math.min(rx,ry), Math.PI/6), false);
      } else if (_shape === 'star' || _shape === 'starFill') {
        const R = Math.min(rx,ry), r2 = R*0.4;
        const pts = [];
        for (let i=0;i<10;i++) {
          const a = (i*Math.PI/5) - Math.PI/2;
          const d = i%2===0 ? R : r2;
          pts.push([cx+d*Math.cos(a), cy+d*Math.sin(a)]);
        }
        drawPoly(pts, _shape==='starFill');
      } else if (_shape === 'arrow') {
        const dx=ex-sx,dy=ey-sy,len=Math.sqrt(dx*dx+dy*dy)||1;
        const ux=dx/len,uy=dy/len,hw=Math.max(lw*3,14);
        x.moveTo(sx,sy); x.lineTo(ex-ux*hw, ey-uy*hw); x.stroke();
        const a=Math.atan2(dy,dx);
        x.beginPath(); x.moveTo(ex,ey);
        x.lineTo(ex-hw*Math.cos(a-0.4),ey-hw*Math.sin(a-0.4));
        x.lineTo(ex-hw*Math.cos(a+0.4),ey-hw*Math.sin(a+0.4));
        x.closePath(); x.fill();
      } else if (_shape === 'arrowDouble') {
        const dx=ex-sx,dy=ey-sy,len=Math.sqrt(dx*dx+dy*dy)||1;
        const ux=dx/len,uy=dy/len,hw=Math.max(lw*3,14);
        x.moveTo(sx+ux*hw,sy+uy*hw); x.lineTo(ex-ux*hw,ey-uy*hw); x.stroke();
        const a=Math.atan2(dy,dx);
        [[ex,ey,a],[sx,sy,a+Math.PI]].forEach(([px2,py2,ang]) => {
          x.beginPath(); x.moveTo(px2,py2);
          x.lineTo(px2-hw*Math.cos(ang-0.4),py2-hw*Math.sin(ang-0.4));
          x.lineTo(px2-hw*Math.cos(ang+0.4),py2-hw*Math.sin(ang+0.4));
          x.closePath(); x.fill();
        });
      } else if (_shape === 'arrowCurved') {
        const r2 = Math.min(rx,ry);
        x.arc(cx, cy, r2, -Math.PI*0.8, 0.1); x.stroke();
        const endX=cx+r2*Math.cos(0.1),endY=cy+r2*Math.sin(0.1),hw=Math.max(lw*3,12);
        x.beginPath(); x.moveTo(endX,endY);
        x.lineTo(endX-hw*Math.cos(0.1-1.2),endY-hw*Math.sin(0.1-1.2));
        x.lineTo(endX-hw*Math.cos(0.1+0),endY-hw*Math.sin(0.1+0)+hw);
        x.closePath(); x.fill();
      } else if (_shape === 'cross') {
        const tw=Math.abs(w)/3, th=Math.abs(h)/3;
        x.rect(sx+tw,sy, tw,h); x.fill(); x.beginPath();
        x.rect(sx,sy+th, w,th); x.fill();
      } else if (_shape === 'heart') {
        const s=Math.min(rx,ry);
        x.moveTo(cx, cy+s*0.9);
        x.bezierCurveTo(sx, cy, sx, sy, cx, sy+s*0.3);
        x.bezierCurveTo(ex, sy, ex, cy, cx, cy+s*0.9);
        x.closePath(); x.fill();
      } else if (_shape === 'smiley') {
        x.arc(cx, cy, Math.min(rx,ry), 0, Math.PI*2); x.stroke();
        const fr=Math.min(rx,ry);
        x.beginPath(); x.arc(cx-fr*0.3, cy-fr*0.15, fr*0.08, 0, Math.PI*2); x.fill();
        x.beginPath(); x.arc(cx+fr*0.3, cy-fr*0.15, fr*0.08, 0, Math.PI*2); x.fill();
        x.beginPath(); x.arc(cx, cy+fr*0.1, fr*0.4, 0, Math.PI); x.stroke();
      } else if (_shape === 'bubble') {
        const br=Math.min(Math.abs(w),Math.abs(h))*0.1;
        x.roundRect(sx, sy, w, h*0.8, br); x.stroke();
        x.beginPath(); x.moveTo(cx-10, sy+h*0.8); x.lineTo(cx, ey); x.lineTo(cx+10, sy+h*0.8); x.stroke();
      }
    }

    function moveDraw(e) {
      if (!_drawing) return;
      e.preventDefault();
      const c = canvas(), x = ctx(), [px, py] = getPos(e, c);
      if (_tool === 'shape' && _shapeStart && _snapShot) {
        x.putImageData(_snapShot, 0, 0); // restore before redrawing preview
        drawShape(x, _shapeStart.x, _shapeStart.y, px, py, false);
        return;
      }
      x.lineTo(px, py); x.stroke();
    }

    function endDraw(e) {
      if (!_drawing) return;
      _drawing = false;
      if (_tool === 'shape' && _shapeStart && e) {
        const c = canvas(), x = ctx(), [px, py] = getPos(e.touches ? { ...e, touches: [{ clientX: e.changedTouches?.[0]?.clientX || _shapeStart.x, clientY: e.changedTouches?.[0]?.clientY || _shapeStart.y }] } : e, c);
        if (_snapShot) x.putImageData(_snapShot, 0, 0);
        drawShape(x, _shapeStart.x, _shapeStart.y, px, py, true);
        _shapeStart = null; _snapShot = null;
        return;
      }
      ctx()?.closePath();
    }

    canvas().addEventListener('mousedown', startDraw);
    canvas().addEventListener('mousemove', moveDraw);
    canvas().addEventListener('mouseup', endDraw);
    canvas().addEventListener('mouseleave', e => { if (_drawing) endDraw(e); });
    canvas().addEventListener('touchstart', startDraw, { passive: false });
    canvas().addEventListener('touchmove', moveDraw, { passive: false });
    canvas().addEventListener('touchend', endDraw);

    window.addEventListener('keydown', e => {
      if (modal().classList.contains('hidden')) return;
      
      if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'z') {
        e.preventDefault();
        window.paintUndo();
      } else if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'y') {
        e.preventDefault();
        window.paintRedo();
      }
    });

    const scrollArea = document.getElementById('paintScrollArea');
    if (scrollArea) {
      scrollArea.addEventListener('scroll', updatePageIndicator);
    }

    const rulesList = document.getElementById('paintRecolorRulesList');
    if (rulesList) {
      rulesList.addEventListener('change', () => {
        window.saveRecolorRulesToStorage();
      });
    }

    function showSaveToast(message) {
      const toast = document.createElement('div');
      toast.innerHTML = `
        <span style="font-size:16px;">✓</span>
        <span>${message}</span>
      `;
      toast.style.cssText = `
        position: fixed;
        top: 24px;
        left: 50%;
        transform: translateX(-50%) translateY(-20px);
        background: linear-gradient(135deg, #22c55e, #15803d);
        color: #fff;
        padding: 10px 24px;
        border-radius: 50px;
        font-family: sans-serif;
        font-size: 13px;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 8px;
        box-shadow: 0 10px 25px rgba(34, 197, 94, 0.45);
        opacity: 0;
        transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        z-index: 10000;
      `;
      document.body.appendChild(toast);
      
      setTimeout(() => {
        toast.style.opacity = '1';
        toast.style.transform = 'translateX(-50%) translateY(0)';
      }, 50);
      
      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateX(-50%) translateY(-20px)';
        setTimeout(() => {
          toast.remove();
        }, 300);
      }, 2500);
    }

    window.savePaint = async function(isSaveAs = false) {
      if (window.activePaintTextCommit) {
        window.activePaintTextCommit();
      }
      const c = canvas();
      const bgC = document.getElementById('paintBgCanvas');
      const isPdf = _paintFilename.toLowerCase().endsWith('.pdf');
      
      let blob;
      let mimeType;
      
      try {
        if (isPdf) {
          if (!_paintOriginalPdfBytes) {
            if (!_paintUrl) throw new Error("Original PDF URL not found.");
            const response = await fetch(_paintUrl);
            _paintOriginalPdfBytes = await response.arrayBuffer();
          }
          
          const pageHeights = JSON.parse(c.dataset.pageHeights || '[]');
          const pageWidths = JSON.parse(c.dataset.pageWidths || '[]');
          
          const { PDFDocument } = window.PDFLib;
          const pdfDoc = await PDFDocument.load(_paintOriginalPdfBytes);
          const pages = pdfDoc.getPages();
          
          let currentY = 0;
          let hasAnyChanges = false;
          
          for (let i = 0; i < pageHeights.length; i++) {
            const w = pageWidths[i] || c.width;
            const h = pageHeights[i] || c.height;
            
            const sliceCanvas = document.createElement('canvas');
            sliceCanvas.width = w;
            sliceCanvas.height = h;
            const sCtx = sliceCanvas.getContext('2d');
            const offsetX = (c.width - w) / 2;
            sCtx.drawImage(c, offsetX, currentY, w, h, 0, 0, w, h);
            
            const imgData = sCtx.getImageData(0, 0, w, h);
            const hasDrawings = imgData.data.some((val, idx) => idx % 4 === 3 && val > 0);
            
            if (hasDrawings) {
              hasAnyChanges = true;
              const pngDataUrl = sliceCanvas.toDataURL('image/png');
              const response = await fetch(pngDataUrl);
              const pngBuffer = await response.arrayBuffer();
              const pngImage = await pdfDoc.embedPng(pngBuffer);
              
              const page = pages[i];
              if (page) {
                const { width, height } = page.getSize();
                page.drawImage(pngImage, {
                  x: 0,
                  y: 0,
                  width: width,
                  height: height
                });
              }
            }
            currentY += h;
          }
          
          if (!hasAnyChanges) {
            alert("No changes made to save!");
            return;
          }
          
          const pdfBytes = await pdfDoc.save();
          blob = new Blob([pdfBytes], { type: 'application/pdf' });
          mimeType = 'application/pdf';
        } else {
          const flat = document.createElement('canvas');
          flat.width = c.width; flat.height = c.height;
          const fx = flat.getContext('2d');
          fx.fillStyle = '#fff'; fx.fillRect(0, 0, flat.width, flat.height);
          fx.drawImage(bgC, 0, 0);
          fx.drawImage(c, 0, 0);
          
          blob = await new Promise(resolve => flat.toBlob(resolve, 'image/jpeg', 0.92));
          mimeType = 'image/jpeg';
        }

        const uploadUrl = await apiPost('images/generateUploadUrl', {});
        const res = await fetch(uploadUrl, { method: 'POST', headers: { 'Content-Type': mimeType }, body: blob });
        const { storageId } = await res.json();
        let filenameToSave = _paintFilename;
        if (isSaveAs) {
          const dotIdx = _paintFilename.lastIndexOf('.');
          if (dotIdx !== -1) {
            filenameToSave = _paintFilename.slice(0, dotIdx) + '_edited' + _paintFilename.slice(dotIdx);
          } else {
            filenameToSave = _paintFilename + '_edited';
          }
          // Copy scroll positions in localStorage for the new filename
          const oldScroll = localStorage.getItem('image-share.pdfLastScrollRatio.' + _paintFilename);
          const oldPage = localStorage.getItem('image-share.pdfLastPage.' + _paintFilename);
          if (oldScroll) localStorage.setItem('image-share.pdfLastScrollRatio.' + filenameToSave, oldScroll);
          if (oldPage) localStorage.setItem('image-share.pdfLastPage.' + filenameToSave, oldPage);
        }
        
        // Pass blob.size to fileSize mutation argument to prevent it from displaying as N/A in the gallery!
        const newId = await apiPost('images/saveStorageImage', { 
          storageId, 
          filename: filenameToSave, 
          fileSize: blob.size, 
          folderId: _paintFolderId || undefined 
        });
        
        if (!isSaveAs) {
          await apiPost('images/remove', { id: _paintId });
        }
        
        // Update active editor session variables so that subsequent operations save to the new record
        _paintId = newId;
        _paintFilename = filenameToSave;
        if (isPdf && typeof pdfBytes !== 'undefined') {
          _paintOriginalPdfBytes = pdfBytes;
        }
        
        showSaveToast(isSaveAs ? "Saved As Copy Successfully!" : "Saved Successfully!");
      } catch (err) {
        alert('Save failed: ' + err.message);
      }
    };
    initColorSwatches();
  })();
  </script>
</body>
</html>
