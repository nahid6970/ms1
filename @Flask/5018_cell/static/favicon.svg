<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#107C41" />
      <stop offset="50%" stop-color="#185C37" />
      <stop offset="100%" stop-color="#0E4327" />
    </linearGradient>
    <linearGradient id="sheetGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#107C41" />
      <stop offset="100%" stop-color="#0B552C" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <filter id="innerShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background Squircle -->
  <rect x="32" y="32" width="448" height="448" rx="100" fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- Back Grid Layer -->
  <g opacity="0.15" stroke="#FFFFFF" stroke-width="4">
    <line x1="140" y1="120" x2="140" y2="390" />
    <line x1="230" y1="120" x2="230" y2="390" />
    <line x1="320" y1="120" x2="320" y2="390" />
    <line x1="410" y1="120" x2="410" y2="390" />
    <line x1="100" y1="180" x2="430" y2="180" />
    <line x1="100" y1="250" x2="430" y2="250" />
    <line x1="100" y1="320" x2="430" y2="320" />
  </g>

  <!-- Main Sheet Card (Right Side Grid) -->
  <rect x="180" y="100" width="240" height="312" rx="20" fill="#FFFFFF" opacity="0.95" filter="url(#innerShadow)"/>
  
  <!-- Sheet Grid Rows -->
  <rect x="200" y="120" width="200" height="36" rx="6" fill="#107C41" opacity="0.9"/>
  <rect x="200" y="170" width="90" height="30" rx="6" fill="#E1DFDD"/>
  <rect x="300" y="170" width="100" height="30" rx="6" fill="#107C41" opacity="0.15"/>
  <rect x="200" y="215" width="90" height="30" rx="6" fill="#E1DFDD"/>
  <rect x="300" y="215" width="100" height="30" rx="6" fill="#E1DFDD"/>
  <rect x="200" y="260" width="90" height="30" rx="6" fill="#107C41" opacity="0.15"/>
  <rect x="300" y="260" width="100" height="30" rx="6" fill="#E1DFDD"/>
  <rect x="200" y="305" width="90" height="30" rx="6" fill="#E1DFDD"/>
  <rect x="300" y="305" width="100" height="30" rx="6" fill="#107C41" opacity="0.15"/>
  <rect x="200" y="350" width="200" height="30" rx="6" fill="#107C41" opacity="0.25"/>

  <!-- Left Floating 'X' Badge -->
  <rect x="84" y="146" width="180" height="220" rx="24" fill="url(#sheetGrad)" filter="url(#shadow)"/>
  
  <!-- X Character -->
  <path d="M128 200 L168 256 L124 312 H156 L184 272 L212 312 H244 L200 256 L240 200 H208 L184 236 L160 200 Z" fill="#FFFFFF"/>
</svg>
