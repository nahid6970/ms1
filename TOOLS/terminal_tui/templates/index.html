<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workspace Manager Dashboard</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Xterm.js CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
    
    <style>
        :root {
            --bg-main: #080b11;
            --bg-sidebar: #0f131a;
            --bg-card: #161c26;
            --bg-card-hover: #1e2634;
            --border-color: #232c3d;
            --accent-color: #2563eb;
            --accent-glow: rgba(37, 99, 235, 0.4);
            --text-primary: #f1f5f9;
            --text-secondary: #64748b;
            --text-muted: #475569;
            --green-active: #10b981;
            --green-glow: rgba(16, 185, 129, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* Sidebar styling */
        .sidebar {
            width: 320px;
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            height: 100%;
            z-index: 10;
        }

        .sidebar-header {
            padding: 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .sidebar-header h1 {
            font-size: 1.25rem;
            font-weight: 600;
            background: linear-gradient(135deg, #3b82f6, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 0.5px;
        }

        .refresh-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 6px;
            border-radius: 6px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .refresh-btn:hover {
            color: var(--text-primary);
            background-color: var(--bg-card);
        }

        .project-list {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Project Card item */
        .project-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .project-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background-color: transparent;
            transition: all 0.2s ease;
        }

        .project-card:hover {
            background-color: var(--bg-card-hover);
            border-color: var(--text-muted);
            transform: translateY(-2px);
        }

        .project-card.active {
            background-color: var(--accent-glow);
            border-color: var(--accent-color);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .project-card.active::before {
            background-color: var(--accent-color);
        }

        .project-card.running {
            border-left: 4px solid var(--green-active);
        }

        .project-title-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 6px;
        }

        .project-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .branch-badge {
            background-color: #1e293b;
            color: #38bdf8;
            font-family: 'Fira Code', monospace;
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 4px;
            border: 1px solid rgba(56, 189, 248, 0.2);
        }

        .project-path {
            font-size: 0.8rem;
            color: var(--text-secondary);
            word-break: break-all;
        }

        .active-dot {
            width: 8px;
            height: 8px;
            background-color: var(--green-active);
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 8px var(--green-glow);
        }

        /* Main Workspace Container */
        .workspace {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            background-color: var(--bg-main);
        }

        .workspace-header {
            padding: 16px 24px;
            background-color: var(--bg-sidebar);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 64px;
        }

        .workspace-title-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .workspace-title-info h2 {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .workspace-path-bread {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .connection-status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        /* Terminal wrapper */
        .terminal-container-wrapper {
            flex: 1;
            background-color: #000000;
            position: relative;
            padding: 16px;
            overflow: hidden;
            display: flex;
            align-items: stretch;
        }

        #terminal-parent {
            width: 100%;
            height: 100%;
        }

        .xterm-viewport {
            overflow-y: auto !important;
        }

        /* No active workspace placeholder */
        .placeholder {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px;
        }

        .placeholder-icon {
            font-size: 4rem;
            margin-bottom: 16px;
            color: var(--text-muted);
            animation: float 4s ease-in-out infinite;
        }

        .placeholder h3 {
            font-size: 1.5rem;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .placeholder p {
            color: var(--text-secondary);
            max-width: 400px;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }
    </style>
</head>
<body>

    <!-- Left Sidebar: Workspaces -->
    <div class="sidebar">
        <div class="sidebar-header">
            <h1>📁 WORKSPACES</h1>
            <button class="refresh-btn" onclick="fetchProjects()" title="Refresh workspaces">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/>
                </svg>
            </button>
        </div>
        <div class="project-list" id="project-list-container">
            <!-- Project cards injected here -->
        </div>
    </div>

    <!-- Right Area: Terminal Workspace -->
    <div class="workspace" id="workspace-container">
        <!-- Placeholder shown by default -->
        <div class="placeholder" id="no-workspace-placeholder">
            <div class="placeholder-icon">💻</div>
            <h3>No Workspace Active</h3>
            <p>Select a workspace folder from the sidebar on the left to spin up an interactive PowerShell terminal session.</p>
        </div>

        <!-- Terminal View (Hidden until project selected) -->
        <div class="workspace-header" id="workspace-header" style="display: none;">
            <div class="workspace-title-info">
                <h2 id="active-project-name">Project Name</h2>
                <div class="branch-badge" id="active-project-branch" style="display: none;">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="18" cy="18" r="3"/>
                        <circle cx="6" cy="6" r="3"/>
                        <circle cx="6" cy="18" r="3"/>
                        <path d="M18 15V9a4 4 0 0 0-4-4H9"/>
                    </path>
                    <span id="active-project-branch-text">main</span>
                </div>
                <div class="workspace-path-bread" id="active-project-path">~/TOOLS/project</div>
            </div>
            <div class="connection-status">
                <span class="active-dot"></span>
                <span>Active PowerShell Console</span>
            </div>
        </div>

        <div class="terminal-container-wrapper" id="terminal-wrapper" style="display: none;">
            <div id="terminal-parent"></div>
        </div>
    </div>

    <!-- Xterm.js & Fit Addon Script -->
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>

    <script>
        let projects = [];
        let activeProject = null;
        let term = null;
        let fitAddon = null;
        let eventSource = null;

        // Fetch project workspaces from Flask server
        async function fetchProjects() {
            try {
                const response = await fetch('/api/projects');
                projects = await response.json();
                renderSidebar();
            } catch (err) {
                console.error("Error fetching projects:", err);
            }
        }

        // Render sidebar list
        function renderSidebar() {
            const container = document.getElementById('project-list-container');
            container.innerHTML = '';

            projects.forEach(proj => {
                const card = document.createElement('div');
                card.className = `project-card ${activeProject === proj.name ? 'active' : ''} ${proj.is_active ? 'running' : ''}`;
                card.onclick = () => selectProject(proj.name);

                const titleContainer = document.createElement('div');
                titleContainer.className = 'project-title-container';

                const title = document.createElement('span');
                title.className = 'project-title';
                title.innerText = proj.name;
                titleContainer.appendChild(title);

                if (proj.branch) {
                    const branch = document.createElement('div');
                    branch.className = 'branch-badge';
                    branch.innerHTML = `
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="18" cy="18" r="3"/><circle cx="6" cy="6" r="3"/><circle cx="6" cy="18" r="3"/>
                            <path d="M18 15V9a4 4 0 0 0-4-4H9"/>
                        </svg> ${proj.branch}
                    `;
                    titleContainer.appendChild(branch);
                }

                card.appendChild(titleContainer);

                const path = document.createElement('div');
                path.className = 'project-path';
                // Show shortened display path
                path.innerText = proj.path;
                card.appendChild(path);

                container.appendChild(card);
            });
        }

        // Switch workspace project
        async function selectProject(projectName) {
            if (activeProject === projectName) return;
            
            activeProject = projectName;
            
            // Highlight sidebar selection
            renderSidebar();

            // Toggle placeholders
            document.getElementById('no-workspace-placeholder').style.display = 'none';
            document.getElementById('workspace-header').style.display = 'flex';
            document.getElementById('terminal-wrapper').style.display = 'flex';

            // Get target project metadata and start/load session
            try {
                const response = await fetch(`/api/session/${projectName}`, { method: 'POST' });
                const data = await response.json();
                
                // Update header info
                document.getElementById('active-project-name').innerText = data.name;
                document.getElementById('active-project-path').innerText = data.path;
                
                const branchBadge = document.getElementById('active-project-branch');
                if (data.branch) {
                    branchBadge.style.display = 'flex';
                    document.getElementById('active-project-branch-text').innerText = data.branch;
                } else {
                    branchBadge.style.display = 'none';
                }

                // Spin up or re-connect the xterm console
                initTerminal(projectName);
            } catch (err) {
                console.error("Error setting up session:", err);
            }
        }

        // Initialize xterm.js terminal instance
        function initTerminal(projectName) {
            // Close existing SSE stream
            if (eventSource) {
                eventSource.close();
            }

            const termDiv = document.getElementById('terminal-parent');
            termDiv.innerHTML = ''; // Clear terminal pane container

            // Configure Xterm
            term = new Terminal({
                cursorBlink: true,
                cursorStyle: 'bar',
                fontSize: 14,
                fontFamily: '"Fira Code", Courier, monospace',
                theme: {
                    background: '#000000',
                    foreground: '#d1d5db',
                    cursor: '#3b82f6',
                    black: '#1e293b',
                    red: '#ef4444',
                    green: '#10b981',
                    yellow: '#f59e0b',
                    blue: '#3b82f6',
                    magenta: '#d946ef',
                    cyan: '#06b6d4',
                    white: '#f1f5f9',
                    brightBlack: '#475569',
                    brightRed: '#f87171',
                    brightGreen: '#34d399',
                    brightYellow: '#fbbf24',
                    brightBlue: '#60a5fa',
                    brightMagenta: '#f472b6',
                    brightCyan: '#22d3ee',
                    brightWhite: '#ffffff'
                }
            });

            fitAddon = new FitAddon.FitAddon();
            term.loadAddon(fitAddon);
            term.open(termDiv);
            fitAddon.fit();

            // Handle Resize
            const resizeObserver = new ResizeObserver(() => {
                fitAddon.fit();
            });
            resizeObserver.observe(termDiv);

            term.onResize(size => {
                fetch(`/resize/${projectName}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ cols: size.cols, rows: size.rows })
                });
            });

            // Send initial fit dimension to server
            fetch(`/resize/${projectName}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ cols: term.cols, rows: term.rows })
            });

            // Listen to key inputs in browser xterm pane and send to backend PTY
            term.onData(data => {
                fetch(`/input/${projectName}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ data: data })
                });
            });

            // Connect to server event-stream (SSE) for receiving PTY output
            eventSource = new EventSource(`/stream/${projectName}`);
            
            eventSource.onmessage = (event) => {
                const msg = JSON.parse(event.data);
                if (msg.data) {
                    term.write(msg.data);
                } else if (msg.eof) {
                    term.write("\r\n\x1b[31m[Shell Session Ended. Refresh or re-select to restart]\x1b[0m\r\n");
                    eventSource.close();
                }
            };

            eventSource.onerror = (err) => {
                console.error("SSE stream error:", err);
                eventSource.close();
            };

            // Focus terminal immediately
            term.focus();
        }

        // Initialize on page load
        window.onload = () => {
            fetchProjects();
        };
    </script>
</body>
</html>
